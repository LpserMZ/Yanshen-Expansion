#  YE_Rottenriver.1.t:0 "腐水长流"
#  YE_Rottenriver.1.D:0 "「大江东去万里流，楼船古来无日休。\n 烟景繁华叹苦短，腐水清远劝君游。」\n永宁年间，各邦名流共聚天湖雅会，罗州一狂生在场上作诗讽喻，触怒主宾，被扔进湖中。虽然凭着一身法术侥幸生还，但从此也发了疯，整日地说大江大湖停滞不流腐烂发臭。此后一直沿着烟河流浪，有人听说他精通卜算，也不嫌他疯癫邋遢，恭恭敬敬地请来算卦。疯子吃完饭也不含糊，施展术法窥探天机。"