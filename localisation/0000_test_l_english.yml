烟波湖
烟河之源（另一个河的名字太难打了）
传说，烟河魂与溟波沿着各自的河道拓展势力时在此相遇，两尊不相上下的大灵之间爆发了撕裂群峰的战争。当祂们最终谈合并各自离去时。神壁高墙之上的天池水倾泻而下，治愈了大地的创伤。
若河流如东洲的经脉，此湖即为东洲之心，布满整个东洲的气由此而生。
锁龙塔
烟河魂，伟大巨龙。
当傲慢的先驱精灵进入东洲时，他们丝毫不尊重本地的主人。他们与当时统御东洲的大灵之间爆发了激烈的冲突。最终先驱们利用上庙网络将大灵镇压进灵界，无法对再度对现实位面进行干预。
但烟河魂作为烟河本身也是最为桀骜的大灵，祂的愤怒让烟河激荡，浊浪波涛之下，水族衍生为无数龙嗣。
为此先驱不得不将上庙枢纽立于天楼，束缚烟河之气，另树立锁龙塔将那无数龙嗣镇压于此。之后烟河才得安宁。
水母城
被誉为飞腾浮空城的水母城准确的说并不是真正的浮空城，它通过蒸汽和机械悬浮于天空，远远看上去像一大片黑色的鸟巢，由无数居住点和钢铁框架组成。而周围悬浮着无数提供升力的红色气球。
这源于飞腾人数百年如一日对航空之道的精尽，从最基础的悬浮灯开始，到可以载人的大气球，到飞行舰船，并最终成为悬浮在天空上的一整座城市。
陨蛊坑
灰烬天空撕裂大地时，一道彗星坠落于沙摩羯，彼时的沙摩羯尚为烟人所主导，环境的恶化让繁荣的烟人社会迅速凋敝，他们在废墟中挣扎求生时，残存烟人们发现了来自星空的隐秘。
蛊道
在东洲是一种很少为人所知的方式，信奉此道之人，借助一种被称为蛊的虫类，提高自己吸收和利用气的能力。
只是此道会带来一些小小的副作用，但这点代价相比执念来说并不重要。
天楼枢纽
上庙网络的枢纽，天楼城因天楼上庙群而得名。全东洲最为宏大也是最为高耸上庙群就屹立于天楼湾的岸边。
高耸的庙宇似乎能刺破天空，与云相接。无数的征服者渴望攀登到天楼顶端。但或被刺杀或神秘消失在天楼之中，它为什么而建到现在为止依旧是个谜。
陨灵霖
狐灵被镇压前的最后一口气，化为了隐泉树林上恒久不散的乌云，透过这场下了几千年的细雨，狐灵能够对现实继续施加影响。也让此处的泉水和森林充满了气。
宦官学院
总有些人为了权力不惜残害身体，也要进入宦官学院进行学习。
宦官学院的功法与别处不同，只有失去生殖能力的男性才能学习。这并不是这些功法歧视完整的男性，或者歧视女性。
而是完整的男人和女性的经脉并没有缺失，他们无法运行宦官独有的气法。强行学习只会堵塞气脉而死。
不过这些宦官心里埋藏着一个想法，据说当把功法修炼到十层大圆满时，缺失的肢体会复生。
虫化士兵
修炼蛊道的一个结果，与蛊虫共生导致身体上出现不同的虫化特征，这些特征看起来丑陋非常，但会大幅度提高肉体强度。
苦卤沼
干涸大湖的最后残留，当每年雨季来临的时候，雨水会流入最低洼处，形成分散的小型卤水湖泊，在此时盐工们会将卤水从湖泊中提取出来。
而在一年中大多数时候，这些区域是充满碱水的泥沼，稍不注意就会被吞没。
欢迎提出意见（随便放个小南梁镇楼 m吧）【图片】


string_start_ghavaanaj:0 "§O起源§!\n长期以来，摩楼他沙漠和度阇多丛林之间的这片土地一直由两种人口组成：以这里为家的伽缚那阇人，以及他们在熟练的戾师协助下照料和骑乘的庞大象群。\n\n伽缚那阇部落最初统一于§Y罗祆罗阇§!，这是罗祆（和哈兰）的最初一批帝国之一，但当这个帝国在灰元前200年灭亡时，部落之间再次陷入争斗。灰元35年，§Y诃利秣大帝§!率领虎人走出飞升半岛的丛林，大举征服了整个罗祆和东洲。大象部落在他的新诃利秣罗阇中找到了一席之地，并接受了经萨持颇阵敕令改革的§Y罗祆种姓制度§!——尽管他们仍然是罗祆中少数几个人类仍能跻身上层种姓的地方之一。\n\n在诃利秣消失后的几个世纪里，随着诃利秣罗阇逐渐崩溃，这些部落重新赢得了独立。灰元1304年，伽缚那阇被自己人统一：稽设婆伊一世，§Y度伽时罗的黑王§!。但仅仅几十年后，「再统一者」罗摩波剌就来了，他要为他重新锻造的诃利秣罗阇再添一颗宝石。虽然大象的冲锋抵挡住了罗摩波剌的第一次入侵，但部落还是屈服于他的第二次入侵，黑王在莲座前放下了他的王冠。他们的伟大城市，以举办黑王城运动会而闻名的§Y黑王城§!，被送给了虎人沙漠雷霆氏族，而现在分裂的伽缚那阇部落变成了单纯的波罗部。\n\n§O近期历史§!\n然而现在，一个变革的时代降临到了整个罗祆。§Y莲花宫廷§!的腐朽从根本上毒害了日渐衰弱的罗阇国，而在北方，废墟王国已经被一个新的威胁——§R大地精的命令秩序§!——迅速征服。随着老虎锁链的削弱，大象领主可能会再次崛起。\n\n在王室的衰败中，大象领主们会再次团结起来，加冕新的黑王，将他们的养象术推向新的高峰吗？还是分裂的部落会被另一个主人踩在脚下？"

R51_eunuch_ministers_title:0 "宦官与官员们"
R51_eunuch_ministers_desc:0 "当诃利秣征服东方并把许多民族纳入他的帝国时，他面临着一个新奇的问题——从零开始建设一个帝国的官僚机构。不像罗祆存在罗阇国官员，烟州不存在管理国家的上层建筑。诃利秣没有扩大种姓制度，而是创建了一个新的官僚机构，它更符合烟州人的习俗——宦官。\n\n随着时间的推移，宦官们的影响力甚至超过了罗祆的官员们，在诃利秣的国家的东部地区崩溃后，宦官们继续统治着现在的独立君主国。现在烟洲的大部分地区已经收回，问题就来了，我们该如何处理宦官大臣们，如何将他们的行政专长整合到罗阇官员中。这次合并需要时间，但获得这么多有才华的官僚肯定对国家有好处。"

flavor_pasiragha.201.t:0 "灵魂和精神的本质"
flavor_pasiragha.201.d:0 "烟州人认为，凡人之躯内存在着两种灵。其一为「魂」，即空灵之魂，负责我们的智力、息以及意志；另一种则是「魄」，为肉体之魄。人死后，两种灵分离，空灵之魂飘向天空，而肉体之魄回归大地。于是，魂便仍与物质世界有所羁绊，唯有达成「与道合真」，我们的空灵之魂才能在来世与上神相聚。高等哲学认为，在东洲游荡的祖灵便是这些被困住的魂，它们无法抵达与道合真，因而在痛苦中给凡人带来麻烦。\n\n鉴于知晓空灵之魂能够分离并在世间自由移动，哲学家们开始质疑存于魂之中的息是否也能如此行事。升灵学派始终认为情况确实如此，他们觉得息能够自由出入人的身体。他们相信任何事物都可成为承载息的媒介，而且息能够在这些媒介之间移动。然而，其他学派的哲学家们却并不认同，他们争辩说息无法在媒介之间移动，且只存在三种媒介，即个体、世界以及存在本身。他们指出升灵学派的信仰受到其学派背景的影响，因为该学派起源于烟州，故而将传统烟州人的信仰作为其论点的基础。"

flavor_pasiragha.206.t:0 "高等哲学的本质"
flavor_pasiragha.206.d:0 "虽然我们缺乏关于高等哲学早期的详细记载，但很明显，从最初的概念到如今的形态，它走过了一条漫长且充满故事的道路。高等哲学脱胎于罗祆人的提毗马儿毡秘教信仰，它在演变过程中逐渐摒弃了对上神的直接崇拜，转而倾向于效仿上神的行为，以在死后实现与他们的精神合一。每个学派对于如何实现这一目标都有不同的见解，但它们之间的共同主线是都在敦促人们在尘世过上美好的生活。这种从对上神的虔诚崇拜转变为对他们行为进行讨论的本质变化，让一些哲学家质疑高等哲学本身是否应该被视为一种宗教，还是如名称所示，是一种关乎人们日常生活的哲学与指引。"
flavor_pasiragha.206.a:0 "高等哲学本质上还是一种源于对上神的信仰的宗教"
flavor_pasiragha.206.b:0 "就其当前的形式而言，它是一个关于如何过上美好生活的思想流派。"

flavor_pasiragha.241.t:0 "神性的本质"
flavor_pasiragha.241.d:0 "尽管上神是高等哲学所关注的对象，但他们身上仍有许多不为人知的谜团，始终让我们难以捉摸。上庙向我们讲述了我们所知的关于他们的一切——然而，对于他们究竟是谁，却无从说起。罗祆人最早的信仰形式——提毗马儿毡秘教，将上神视为应被人们崇拜与祈祷的存在。他们认为上神与凡人全然不同，拥有某些神圣且无法言传的特性。与此同时，形成高等哲学最初形态的萨持颇阵第一次会议上所发生的诸多辩论，使上神从其神圣地位上被降级了。如今，人们认为他们所具备的先天智慧并不比普通人类更多，但他们能够达成几乎所有哲学家们梦寐以求的事——在死后达成精神上的统一，也就是所谓的与道同真。这种区别引发了诸多争论，主要是关于凡人是否能与上神相提并论，或者说除了率先达成与道合真之外，他们是否还拥有其他任何无法言传的特性。这场争论自萨持颇阵第一次会议起便激烈展开，在陀弃蓝毗会议上得以延续，而如今，沙楼宫永论庭也有机会就此事发表看法了。"
flavor_pasiragha.241.a:0 "他们是初，仅此而已"
flavor_pasiragha.241.b:0 "祂们拥有无法触及的特性"

shenral_a_major_heresy_title:0 "主要异端"
shenral_a_major_heresy_desc:0 "高等哲学诞生于诃利秣大帝的征服和对东洲的憧憬，一千多年来一直在整个罗祆占主导地位。这种信仰并非没有缺陷，「苏汉」就是利用这些缺陷为自己的异端信仰辩护。然而，其中一些信仰是合乎逻辑的，而我们的人民却分裂了。我们必须在这场哲学大辩论中站在一边，以普尔塔纳之名，再次团结众神的追随者！"

flavour_yinquan.18.desc1: "在我们找到标志着[4979.GetName]的三道弯曲划痕之后，我们发现[4979.GetName]上庙在我们的探险队到达前几乎没有前人的痕迹。舒武什人的掠夺无可避免地会阻碍我们在这里的探索，所以我们会花费更多人力在边疆防卫上。因此，这座不知为何保存良好的神庙让我们的学者们得以一窥上庙的建筑结果。\n\n我们实际达成有效探索的过程更加漫长，因为上庙内部的陷阱重重还是让探索缓慢高风险。同时，我们很难给探险者们足够的钱让他们不去洗劫上庙。在我们如同梳篦一般清点陷阱的时候，探险者们找到了一扇暗门。这扇暗门背后是一个暗室，其中有一个壁画展现一只庞大的带角形象正在逃离一系列更小的模糊形象，在最中央有一颗符文宝石。在我们尝试将它取出研究时，不小心将它摧毁了。\n\n我们会在对于[4979.GetName]神庙群进行完全绘图记录之前会继续研究，但是进一步进展已经被那些充斥着不知名防护的大门所阻碍。"

flavour_yinquan.18.desc2: "在调查过程中，管理[4925.GetName]神庙的僧侣们给我们留下了深刻的印象——当然是负面的，一群喋喋不休的老头子，搞得我们焦头烂额。经过多次反复（正如您所知，交涉过程构成了我们进度报告的大部分），他们终于默许了我们的深入探险。\n\n至于神庙本身，其普遍的象征是一枚类似半颗星型的尖形图纹。神庙内部的布局格外复杂；尽管地下通道似乎并不太深，但却像蜘蛛网般相互纠结扭曲。我们的冒险家吐槽道，这座建筑似乎是故意设计成让外来人员在里面迷路一般，而为了导向正确的方向，我们最终不得不求助于雕刻和地标。\n\n在这一迷宫的尽头，我们发现了一颗与其余神庙中性质相似的未知宝石，其上铭刻的半星图纹在神庙建筑群的壁画中随处可见，其周围环绕着多种多样的艺术画，详细记载了许多形状与上庙相似的建筑结构。这块宝石很脆，稍微一碰就碎掉了。我们对着宝石上的艺术画临摹了一幅草图，然后很快就离开了；要是让那些冷漠的虎人知道我们弄碎了神庙里的东西，还指不定会闹出什么麻烦呢。"
flavour_yinquan.18.desc3: "倘若不是身负探险责任，[4930.GetName]真是个休闲居住的好地方。此处神庙记载的符号类似于两条并排的双曲线，这一符号在各种艺术壁画中不算普遍，似乎比起大多数其余的符号，更像是一个名字。具体原因尚不清楚，尽管一同参与探险的学者们认为这只是因为该符号无法很好地融入艺术当中。然而，确实有一幅壁画以这种符号为主体，那是一头被锁链拴住的九尾狐，而每条锁链的形状都好像两弯相对的新月。\n\n探索这座神庙并没遇到什么重大的延误。即便如此，我们在等待学者分析从这座神庙中提取到的丰富信息，并作出适当的解读仍花费了相当之长的时间。不过，这一等待被证明是值得的——在解读了信息的学者指引下，我们找到了神庙群内的符文宝石。据报道称，我们一把宝石从插槽里撬出来，它就不再发光了。这里有很多值得我们研究的地方，尤其是被链条锁住的狐狸。"
flavour_yinquan.18.desc4: "在我们找到这个由两个不规则弧形和一道和它们交叉的线组成的形状之后，[4859.GetName]的上庙已经没什么秘密留待揭露的了。令人苦恼的是和往常一样我们受到厄运和问题的拖延，进度因为一群希望在自己经手的国家资产上尽可能敲骨吸髓的家伙而难以继续。在我们把他们全部捉住处决之后进度才开始重新推进。\n\n符合我们目标的符文宝石的位置一直到叛徒所辖区域被搜查之后才找到。它最后未经波折成功回收。我们同样也收到了对于它所处环境的记叙，记录说周围是一些环绕圆圈的带角形象。在它被带出上庙时，一位冒险者记录说发现它发出的光芒开始黯淡，甚至最终熄灭了。此信应当也附加一份经过核实的费用表，需要尽快更新。"
flavour_yinquan.18.desc5: "我们来到[4949.GetName]上庙后起初得到欢迎，但是很快关系僵硬了起来，因为我们雇佣的冒险家不幸有习惯偷走狗头人作为探索上庙时的护身符保佑顺利。这很明显不被允许，因此我们现在开始严重缺乏人力。\n\n在神庙中最明显的徽记是一个由长而扭曲的直线和三个在不同地方与之交叉的直线构成的符号。尽管如此，这里真正吸引我们派遣的学者的注意（当然也是我的注意）的是上庙深处的壁画砖，就位于我们搜寻的宝石周围。它描绘的是一群有显著长角的生物被放置于一群更小的，缺乏细节的形象旁边。"
flavour_yinquan.18.desc6: "[4839.GetName]神庙对应的符号突出铭刻于其间的设施上，形状类似于一把刃尖向下的利剑。神庙的布局表面上看起来很合理，但一旦人们开始仔细检查其中的房间，就很快会发现其中的一场之处。庙宇内部所有的房间都乱七八糟地摆满了家具，似乎设计时丝毫不考虑效率问题——至少负责分析的学者们如此说道。与这次探险关系更大的是，这一系列家具设施要么隐藏着陷阱，要么干脆本身就是陷阱。好吧，看来不管这座神庙隐藏着什么秘密，很明显它不会轻易被揭开……\n\n我确信，这座上庙里还隐藏着更多亟待发现的秘密。然而，此次探险的目标——一颗印着神庙之剑符文的闪耀宝石——已被发现并编目。值得注意的是，神庙唯一的空房间里存有一张类似于素描形态的壁雕，描绘了一座近似上庙的巨型建筑，四周环绕着许多小一号的次级神庙，由雕刻精美的细线连接在一起。结合其他类似的绘画，它似乎描绘了一幅怪诞的画面。"
flavour_yinquan.18.desc7: "我们设法建立了一座探险基地，为冒险家们提供食粮补给，随后派遣一支探险队进入上庙群的深处建筑进行探索，没有遇到任何重大的复杂情况或延误，令我简直不敢相信此等好运。自然，这种好运并未持续。我们没花什么功夫就走完了神庙群，发现绘制的地图比大多数其余上庙（除了[4871.GetName]大神庙，其余神庙群的地下建筑面积大致相同）要小得多，而且在里面找不到与神庙群相关的符号。\n\n进一步的搜索显示，不出所料，该神庙群的大片建筑区域隐藏在秘密墙壁和通道内，一座座房间被发光符号的黯淡光线所照亮。我们在这些房间中找到了预期的符号：六条在一个中心点相互汇聚的曲线。最大的符号存在于该神庙符文宝石附近发现的一幅壁画，描绘了无数的形状和物体，并在地面上留下了类似小径的凹槽。\n\n这些房间中没有一个能穿过神庙群深处熟悉的结界防护门。即便如此，又一颗符文宝石还是从上庙中提取出来并进行研究。"
flavour_yinquan.18.desc8: "在准备为此次探险队做好基础工作时，我们得到了当地武僧的慷慨帮助——老实说，可能有点太慷慨了。最终，我们在接受了武僧们的热情款待后，接受了他们一道进入上庙的请求（尽管为此花费了更多时间，但考虑到他们的高超武艺，拒绝是很不明智的）。\n\n正如所期望的那样，神庙内部的许多物品上都铭刻着一个类似于两条中间交叉的直线的符号。陷阱不少，这也在预料之中的，但似乎与我们一道前来的武僧们精于识别陷阱——当他们知道要寻找什么时。然而，武僧们的专业知识确实提供了新的视角——我们发现了一把绘有精细复杂令人难以置信的黑剑浮雕，看起来与传说中的空刃如出一辙。\n\n一位武僧在某个入口被遮蔽起来的密室里发现了宝石。由于处理不当，宝石到达我们手中时已经碎掉了。不过，既然找到了这块宝石，我们就没有继续待在神庙里的理由了。"

flavour_yinquan.18.desc9: "[4618.GetName]的上庙符号看起来像是5条以不同的角度相交于一点的线，对我们这些负责监督探险队的人而言格外危险。虽然原因尚不清楚，但冒险家和学者们神情沮丧，士气低落，甚至接近于哗变。很抱歉的是，我之前从未告诉过[Root.Monarch.GetTitle]您这一点，因为我们仔细控制了队伍状态，确保他们永远处于可控制的范围，不会演变成真正的兵变。\n\n神庙群内部建筑的繁琐布局和遍布陷阱似乎已经司空见惯，而这座神庙也并不例外。最引人注目的部分是一幅隐藏的壁画，上面描绘了一条大河被明显的锁链束缚。这似乎是神庙的核心点，旁边放着一颗破裂而闪烁的宝石。我们无法在保持宝石大体完好的情况下将其移走。壁画草图已随本报告一起传达，请您阅览。"

flavour_yinquan.19.title: "神庙事件：大门洞开"
flavour_yinquan.19.desc: "「[Root.Monarch.GetTitle]，我再次向您报告最新进展。其余的探险队员们，无论他们究竟做了什么，已经成功摧毁了通往[4871.GetName]神庙深处的障碍！在您的要求下，我在每次成功探险位于各地的次级神庙后，都让人检查封印雕像；每成功一次，龙身上就有一颗原本闪耀的宝石开始明灭不定。还有人向我提到，随着每一颗从次级神庙中发掘出的宝石损毁，龙身上的宝石也开始变得愈发黯淡。当最后一颗宝石粉碎时，一行人发现巨龙雕像正逐渐粉碎化灰，而封印门扉的魔法彻底消失了。\n\n命令整个探险队留在这里，尽管费用高昂，但为这一时刻做准备却容易了一个数量级。当这封信到达您的手中时，一群经验丰富的冒险家将带着谨慎与好奇探索暴露出的神庙深处，他们身后跟随着一支名副其实的学者队伍，将他们发现的每一幅壁画、每一个拐角和每一桩奇异之事记录下来。但在对其余发现进行充分地解析并发送给您之前，应该还需要一段时间。」\n\n——队长刘禺"
flavour_yinquan.19.a: "会有什么问题呢？"
flavour_yinquan.20.title: "神庙事件：[4871.GetName]深处"
flavour_yinquan.20.desc: "「此次发送的信息万分危急。切莫让任何服侍您的「学者」查看。在其余神庙发现的壁画揭示了一个事实，从[4871.GetName]这座大神庙的角度来看，只能让我感到恶心。这些神庙并非仅是装饰——在上庙深处，我们发现了一个……我只能形容为心脏的结构。随着这颗心脏的每一次「跳动」，它似乎都会放射出阵阵疲乏之浪，穿透我的灵魂。仔细观察，我们发现了从西边穿入这颗心脏，然后向东方穿出离开的力量之线，仿佛某种未知巨兽的血管一般。在长达数月的仔细研究后，我们只大致了解这颗心脏的基本情况：无论实际为何，它首先是汇集了百般灵魂的诅咒之物！我不知道它们究竟被送到哪里。我只知道：这些神庙里的真实之物绝不值得崇奉。\n\n[Root.Monarch.GetTitle]，在针对解决上述之事时，请您务必万分小心。我并非第一个收到这些信息的人，在我给您写信的时候，这条消息几乎必定会如同野火般在农村蔓延。高等哲学的学者们不可信赖；他们必然会抱团为自己那可怕的偶像辩护。他们不会关心未来的可怕后果——这些学者只会看到上庙的真相被永久压制。请您务必阻止他们，而我会想办法永远摧毁这座寺庙。」\n\n——队长刘禺，标记为紧急事态"
flavour_yinquan.20.a: "令人不安……我会留意的。"
flavour_yinquan.21.title: "神庙事件：重组行政"
flavour_yinquan.21.desc: "起初，刘禺的警告令人难以置信。探险队长的指控荒谬至极——高等哲学的学者们决不会作出如此形同叛国之举。然而，随着谣言逐渐传播，它开始变得愈发可信；作为一个群体，宦官们变得愈加冷漠而疏远。这群人是高等哲学的同情者——也就是说，他们坚定地希望保护[4871.GetName]上庙，而在大多数宦官看来，队长的这番言辞无非是想要将这座大神庙彻底洗劫一空，他们安静的服从变成了怨愤，怨愤酿就了无礼。\n\n他们的怨愤无礼是对[Root.GetName]的威胁。在这一事态最终演变成叛乱前，必须做些什么了。"
flavour_yinquan.21.a: "备纸笔。我需要写一封信……"
flavour_yinquan.22.title: "神庙事件：[4871.GetName]之心"
flavour_yinquan.22.desc: "在过去的一年里，刘禺忙得是不可开交。他并未接到一份留在神庙中的明确命令，但凭着纯粹的坚决意志（以及丰厚的报酬），他成功让一支由冒险家和守卫者们组成的坚定队伍与自己并肩作战。[4871.GetName]上庙的深处并没有上层那般危险，但里面记载的信息甚至让上层的陷阱相形见拙。随着时间推移，营地内的人员逐渐勾勒出了完整的轮廓。刘禺亲眼所见，每一天浮现出的更多细节都描绘着相同之事：这座神庙存在的目的是为了折磨灵魂，抽干它们的生命与灵力。上述的一切都是由这颗满溢灵力的天楼之心所推动，而队长知道几记毁灭性的重锤凿击足以了结它。\n\n今天，刘禺收到了他一直在等候的信。「摧毁神庙」，他读到，而这就是队长想要看到的。刘禺召集了手下最为正直的人们（此时剩下的大多数人都是如此），分配给他们镐头和铁锤。他的工作短促、紧张而令人厌烦；首先是送走营地里的「学者」们，这些成天沉浸在书本里的书呆子在战斗方面孱弱得可怜，尤其是当他们措手不及地遇袭时。\n\n当队长和他的战士们来到上庙的最深处时，他们也不例外。仿若圣歌的吟唱响亮得足以与岩石的撞击声比肩，但义军只会在这交响乐也似的背景音乐下走得更远。刘禺很快找到了天楼之心。这颗心脏的脉动似乎随着他的到来而急促加快。在人群的欢呼声中，队长一击接一击地彻底终结了神庙，直到他的手臂神经因疼痛而尖叫，他的肺部气喘吁吁地急促收缩。\n\n「将士们……！」刘禺终于让队伍安静下来，「考虑到今日的所作所为，我认为你们都应该得到加薪！」"
flavour_yinquan.22.a: "「快动手吧，大家！[4871.GetName]之债千万年未清！」"

flavour_yinquan.26.title: "抢夺财产"
flavour_yinquan.26.desc: "报道自沿河岸的各座城市如雪花般纷至沓来，自耕农和佃农们一股脑地从农村走出，这群暴徒开始在城市里闹事。商人、学者和贵族都被拖出家门并被私刑处死，他们的财产在即兴地抽奖中被分给了农民。在此期间，城市警卫一直在竭力阻止暴乱。随着局势的迅速恶化，他们向国家请愿，要求增派人手，或者至少提供一个更可行的计划来阻止暴徒。\n\n当然，我们别无选择，必须做点什么。如果国家派遣增援部队驱散农民，那么农村地区在未来一段时间里将不会平静。另外，也许可以简单地派人监管私刑和抽奖活动。这将使我们双方都能从商人身上分一杯羹，并以更加灵活变通、对宗教更友好的商人团体取而代之。一旦他们有时间利用新获得的财富。"
flavour_yinquan.26.a: "阻止他们！这些是他们的同胞！"
flavour_yinquan.26.b: "私刑？哦行吧。只要确保我们也能分一杯羹就好。"
flavour_yinquan.27.title: "虎人暴力"
flavour_yinquan.27.desc: "许多虎人奇迹般地在之前的暴动中幸存。可能是因为没人想用私刑处死一只会走路的老虎。但随着每一座上庙的谜团揭开，另一个关于高等哲学市民的谣言开始传播。不久前这终于达到了顶峰，因为就连城市警卫也开始歧视与反对城内的虎人，将他们视为一种压迫与折磨人们喜爱之灵魂的信仰象征。\n\n也许我们没什么可为虎人族所做的。但即使有，我们真的希望身边周围居住着神庙爱好者的象征吗？如果允许他们留下来，那将是对狐仙之名的嘲弄。看来我们的工作会为我们完成的。"
flavour_yinquan.27.a: "什么？不，快快阻止这种疯狂行为！"
flavour_yinquan.27.b: "屠光这些两脚走路的老虎，一劳永逸！"
flavour_yinquan.28.title: "神召召不应"
flavour_yinquan.28.desc: "虎人们遭到的麻烦仍在继续。许多暴徒已经开始在农村四处游荡，寻找并袭击虎人农民。尽管大多数事情都发生在我国军队鞭长莫及的范围之外，在我们介入之前（很容易地）完成了谋杀，但农民们现在已经将目光投向了神召王朝的庄园。许多神召族人已经被杀，但暴徒尚未闯入王朝宫殿的中心。他们清楚地意识到迫在眉睫的危险，并恳求国家施以援手；神召虎人们呼吁着自己与[Root.GetName]之间的良好关系。\n\n如果我们冷眼旁观，死去虎人们留下的权力真空肯定会被黎禾仕女们所填补，而她们似乎很乐意自己管理新的土地。另外，如果我们要对神召王朝施以援手，那么就可以把清理干净的土地据为己有。农民当然不喜欢这样，但国家所言就是法律。"
flavour_yinquan.28.a: "保留神召王朝的残系。"
flavour_yinquan.28.b: "这块土地会归仕女们所有？那这有什么问题？"
flavour_yinquan.29.title: "狐胜虎威"
flavour_yinquan.29.desc: "随着上庙之秘暴露在每一个愿意倾听的人面前，也难怪几乎所有的烟州居民都接纳了密契。我们甚至不需要自己费力「说服」死硬的狂热分子——他们早就被对付了！如今，国内只剩下唯一的高等哲学主流家族。神召虎人们拒绝皈依，即使真相已经摆在他们面前。\n\n然而，狐仙不会纵容任何高等哲学信徒进入我国。他们若是不皈依，就会被毁灭。他们的势力早已衰微，只剩下无用的臭钱，然后被正义的农民所消灭，他们无法抵抗我军锋。将神召们象征性的力量撒向风中，虎人帝国的血脉从此沉寂。"
flavour_yinquan.29.a: "神庙爱好者一定要被灭掉！"
flavour_yinquan.29.b: "杀光虎人，净化国家！"

Y25_the_heavenly_towers_title: "天塔"
Y25_the_heavenly_towers_desc: "天楼：无论在高等哲学的历史亦或是我们王朝的历史上都是最为重要的城市。诃利秣征服了此地，也是于此地行使统治，也是在这里，整个东洲最宏伟的上庙群坐落于此。而诃利秣本人也在此地的天塔上消失的。随着庙学监的建立，他们的首要任务就是对上庙的研究。千年来，许多高等哲学的修习者以获得悟道为目标，崇拜这些上庙，但很少有人研究这些神庙到底是干什么的？它们的作用是什么？在那些上神还被束缚于低等存在的时候，它们的作用又是什么？我们伟大的哲学家和学者将以敬重之心，竭尽全力去思考，研究。"

high_philosophy_events.113.d:0 "高等哲学在宽容问题上一直是个谜。在东洲，追随升道、化道和密契的人们通常能够不受太多干扰地信奉自己的信仰。然而，在各个高等哲学流派的范畴内，情况却有所变化。它最初是作为古老的提毗马儿毡信仰的融合形式，以谦逊起步，但随后一次又一次的分裂将其教义撕扯得支离破碎。星眼派与金殿派、升灵派与整爪派、耀阳以及其他所有流派，它们分别在众息、自息以及圣徒等问题上存在根本性的对立。\n\n虽说并非所有流派都彼此针锋相对，但如今发生的流血事件只会加剧本应早已深埋于过往议事会中的紧张局势。在永论庭里的交谈演变成了肢体冲突，就在我们自己的都城内，一场哲学上的分歧最终以刀剑相向收场——宫殿的地面被鲜血染红。在改革过程中，橙带派父辈与实践派子辈之间那种充满暴力的对立，在我们这个圈子里也同样上演着。我们已经颁布了宽容敕令，可如果我们连自己内部都无法相互宽容，那我们的话又有什么用呢？或许颁布那道敕令本就是个错误……"

pasiragha_upgrade_paths_title:0 "升级道路"
pasiragha_upgrade_paths_desc:0 "犍计阗高地的大部分地区被我们掌控，我们便可以开始拓展我们的小径与道路，以便穿越山脉和丘陵。陀弃蓝毗将是下个目标。正是在那儿，罗摩·捺·僧诃关于气的教义于146年的旧总督府内被完全融合入高等哲学。在铺设新道路的同时，我们也应该花时间对老旧的基础设施进行投资。自第一条土石路铺设以来，工程技术已有了长足发展，现在是时候进行升级了。"














suppress_eunuch_caste_title:0 "削弱宦官权力"
suppress_eunuch_caste_desc:0 "烟州的宦官群体是一个独立于国家存在，而且极富权势的政治团体。我们可以废除他们的特权，削弱他们的政权，从而清除掉威胁我国政府权威的潜在敌人。"

reinstate_eunuch_caste_title:0 "恢复宦官权力"
reinstate_eunuch_caste_desc:0 "虽然我们和宦官之间存在着很多问题和矛盾，但在烟州的历史上，他们大多数时间都充当着可靠管理者的身份。所以，我们欢迎他们重回政府的行列，这样，他们的才智就可以为我们所用了。"

estate_uppercastes_eunuchs_in_uppercastes:0 "整合宦官"
estate_uppercastes_eunuchs_in_uppercastes_desc:0 "出于种姓制度的目的，所有的宦官将被计入上层种姓的行列。实际上，这意味着任何想要提升自己生活地位的人都可能去选择成为一名太监，改善自己的生活，并协助完成统治一个帝国的艰巨任务。"

estate_dragon_command_utilize_eunuch_expertise:0 "利用宦官专长"
estate_dragon_command_utilize_eunuch_expertise_desc:0 "在我们被征服的人民中，烟州太监是个例外。他们无法参与传统家庭单位，人们可能会认为他们对司令部毫无用处。事实上，缺乏家庭关系意味着他们对国家的奉献是全方位的——我们可以寻求他们的指导，而不用担心他们暗藏忠诚。"


estate_uppercastes_eunuchs_in_uppercastes:0 "整合宦官"
estate_uppercastes_eunuchs_in_uppercastes_desc:0 "出于种姓制度的目的，所有的宦官将被计入上层种姓的行列。实际上，这意味着任何想要提升自己生活地位的人都可能去选择成为一名太监，改善自己的生活，并协助完成统治一个帝国的艰巨任务。"


estate_dragon_command_utilize_eunuch_expertise:0 "利用宦官专长"
estate_dragon_command_utilize_eunuch_expertise_desc:0 "在我们被征服的人民中，烟州太监是个例外。他们无法参与传统家庭单位，人们可能会认为他们对司令部毫无用处。事实上，缺乏家庭关系意味着他们对国家的奉献是全方位的——我们可以寻求他们的指导，而不用担心他们暗藏忠诚。"


estate_raj_ministries_eunuch_integration:0 "大臣与宦官整合"
estate_raj_ministries_eunuch_integration_desc:0 "烟州宦官是由诃利秣创建的，是一个平行的官僚系统，绕过了各部的习俗和程序。现在我们重新占领了宦官统治的土地，我们把他们纳入了内阁，提高了机构的效率。"


estate_eunuchs_anb:0 "宦官"
estate_eunuchs_anb_desc:0 "宦官是烟州的统治阶层，在众国时代作为忠诚的顾问，但在虎人帝国时期开始真正掌权，他们作为管理者受到青睐，没有传统贵族的裙带关系和分裂忠诚。虎人帝国灭亡后，太监们宣布自己拥有主权，甚至现在还对烟州的大多数国家保持着控制权。"


estate_eunuchs_anb_land_rights:0 "$ESTATE_NAME$领地权"
estate_eunuchs_anb_land_rights_desc:0 "宦官们渴望从土地中获得收入，这样他们就可以把自己奉献给我们的官僚机构，而不必为诸如寻找自己收入来源之类的琐事操心。"


eunuchs_estate_anb_events.2.t:0 "[Root.Get宦官Name]势力扩张"
eunuchs_estate_anb_events.2.d:0 "国家不是我国唯一的影响力来源。在过去的几十年里，一位天赋异禀的宦官领袖成功地提升了主要的宦官家族在我国大多数机构中的权力。\n人脉和特权能构成庞然大物，特别是与野心相结合的时候。"


eunuchs_estate_anb_events.4.t:0 "贪婪的[Root.Get宦官Name]"
eunuchs_estate_anb_events.4.d:0 "一个由最腐败的[Root.Get宦官Name]家族所主宰地区人民的代表今天要求觐见，他声称[Root.Get宦官Name]们在他的故乡系统性地滥用权力，并恳求[Root.Monarch.GetTitle]对此采取措施。作为[Root.GetName]的统治者，[Root.Monarch.GetName]有责任保护人民，放任不管只会显出我们的软弱，也不利于该省的长期发展。但[Root.Get宦官Name]也不会任由如此显贵的家族被惩戒。"


eunuchs_estate_anb_events.5.t:0 "[Root.Get宦官Name]势力衰落"
eunuchs_estate_anb_events.5.d:0 "[Root.Get宦官Name]在我国既是有影响力的地主，又是传统的行政人员，但他们最近的日子并不好过。由于过度的内部争斗和不协调的权力博弈，[Root.Get宦官Name]失去了在[Root.Capital.GetName]的影响力，许多人已经退休到农村的地产去了。"


eunuchs_estate_anb_events.13.t:0 "继承人被[Root.Get宦官Name]教育"
eunuchs_estate_anb_events.13.d:0 "当我们的[Root.Monarch.GetTitle]还是继承人时，[Root.Monarch.GetSheHe]就被宫廷里的宦官辅导。从各方面来看，这对[Root.Monarch.GetHerHis]都有好处。确切地说，[Root.Monarch.GetSheHe]学到了什么？"
eunuchs_estate_anb_events.13.a:0 "[Root.Monarch.GetSheHeCap]学到了很多关于治理和法律的知识。"
eunuchs_estate_anb_events.13.b:0 "[Root.Monarch.GetSheHeCap]学到了很多关于贸易和外交的知识。"
eunuchs_estate_anb_events.13.c:0 "[Root.Monarch.GetSheHeCap]学到了很多关于战争的知识。"


xiyun.1.t:0 "继任者"
xiyun.1.d:0 "现在是我们的领主选择继承人的时候了。作为一个宦官，他没有能力养育自己的孩子，不过这并不妨碍他收养一个侄子作为他选定的继承人来抚养。今天，他的几个亲戚已经走到王位前，提出自己的要求，现在需要的是[Root.Monarch.GetName]来决定他们中的哪一个是值得的继承者。"


form_liang_title:0 "烟州帝国"
form_liang_desc:0 "在虎人手中结束的烟州王国统治的日子，那些传奇的王朝和英雄的日子，几乎已被遗忘。虽然我们从未完全统一，但虎人和他们的宦官们的阴谋诡计使我们进一步分化。宦官领主和商人诸侯之间的小纠纷已经让烟州虚弱分裂得足够久了，现在是时候让一个皇帝登基，引导我们的人民走向光明和辉煌的未来。"


eternal_council:0 "长生阁"
eternal_council_desc:0 "长生阁是由三个强大的僵尸宫廷组成的联盟，由勘破黑玉城堡秘密的烟心宦官和学者建立。最古老的宫廷是「诸英」，主张和平以促进内部经济的增长。而「万道集」在禁丘建国后不久就出现了，是一个由能言善辩、善操纵之事的江湖人士组成的宫廷，经常戴着优雅的面具来掩盖他们的不死之身。最年轻的宫廷是由前军阀和士兵组成的「孰敌翼」。他们从尊贵的成员中选出一位，领导大约两代人的时间，执政大臣在任期满后必须下台，让其他的宫廷成员接替这一位置。他们严格控制着他们的臣民，利用恐惧和凡人执行者的组合来确保他们国家的忠诚度。尽管如此，他们社会坚定的任人唯贤为几乎所有的人打开了通往至尊的大门，甚至可能被授予一个议会席位来作为他们能力的礼物，此谓「尸骨寒而青云路暖」。正如《黑玉城遗碑》铭文：「腐草化萤日，便是鲤越龙门时。」"


palace_of_divine_call:0 "神召宫"
palace_of_divine_call_desc:0 "--------------\n神召宫坐落在天楼城的中心，它的金色屋顶与赤红拱门见证了这座城市的历史。灰元102年，诃利秣之子，神召的摩那缚一世下令建造了这座宫殿，作为诃利秣帝国的皇室行政机构，在莲畿帝国时期，它曾容纳了一万名宦官和其他皇室行政人员及工作人员。在此后的几个世纪里，它经历了不同时期的衰败和修复——其中最细致的修复工作是在1096年，贾赫将天楼作为其首都时进行的。他在建筑群中建造了布勒瓦尔-精灵风格的旭日厅，标志着这座宫殿是凤凰帝国的中心，也是诃利秣征服的灵魂。"


Y98_touzhun:0 "藩王"
Y98_touzhun_desc:0 "长期以来，这片土地一直被一个狡猾的宦官阶层统治着，他们通过暗地里的阴谋和欺骗来维持和平。我们不能相信这样的「男人」能胜任我们的行政人员；作为替代，我们的帝国将被划分成多个地区，由一个个藩王家族统治，该家族是舒武什家族的后裔，对朝廷忠诚。"


Y19_xuezhefang:0 "学者坊"
Y19_xuezhefang_desc:0 "天楼是烟州最大的宦官学院学者坊所在地。他们和央城一起培养了十分之九的宦官，这些宦官后来会在当地的各种官僚机构中任职。其余的宦官则在较小的学校或私人教师那里接受教育。"


Y05_banner_of_the_ox:0 "牛旗"
Y05_banner_of_the_ox_desc:0 "在烟州，我们的旗帜已成为摆脱宦官暴政的未来的象征，证明这片土地上受苦受难的农民有能力在历史上开辟自己的道路，带领自己从压迫的手中获得自由。"


Y06_the_zhinshi_college:0 "央城学院"
Y06_the_zhinshi_college_desc:0 "央城以其大学而闻名。它培养的学者和智者的数量在整个烟州地区是最多的。许多政治家也在这里接受教育，包括在该地区宫廷服务的宦官。在宦官统治阶层的直接联系方面，只有天楼超过了央城。考虑到这一切，央城也是由整个东洲最聪明的人统治的，这一点也不令人惊讶。"


Y25_submit_to_the_emperor_of_yanshen:0 "臣服于烟州皇帝"
Y25_submit_to_the_emperor_of_yanshen_desc:0 "神召诃利秣是烟州的第一个皇帝，他的孩子们继承了皇位。但几个世纪以来，他们失去了对当地宦官的控制，而这些宦官曾由诃利秣指派来统治当地。因此，到了400年，神召氏族虽仍拥有这个头衔，但它已形同虚设。没有人听从它，它也没有获得任何尊重。\n\n现在，许多个世纪之后，这种情况再次发生了变化。宗畿的虎人再次要求宦官们向神召王朝，即烟州的皇帝低头。"


Z66_imperial_examinations:0 "皇家科举"
Z66_imperial_examinations_desc:0 "宦官阶层虽然有用，但往往比他们的地位所显示的更有野心，他们倾向于从已经显赫的家族中招募成员，最终导致他们在烟州的虎人统治结束很久之后仍然占据统治地位。如果采用古天国的科举制度，就可以选拔忠诚而有能力的干部。"


Z67_eunuch_administration:0 "宦官行政"
Z67_eunuch_administration_desc:0 "在诃利秣大帝征服烟州之后，被消灭的皇族被宦官阶层所取代。从那时起，他们就成为这片土地上的主导力量，利用我们祖先赋予他们的权利。\n\n这些官僚的地位都是我们的功劳，现在是时候让他们回到忠臣的位置上了。"


Y16_hegemon_of_the_north:0 "北方霸主"
Y16_hegemon_of_the_north_desc:0 "在过去的时代，坚墙之爪将他们的影响力扩展到整个烟州北部，站在任何邻国都无法比拟的地方。可悲的是，狡猾的宦官阴谋反对我们，动摇了我们的人民对我们的看法。至前的人民反叛了，鸟骑兵利用这个虚弱的时刻征服了他们的土地，使我们孤立无援。直到太阳精灵来了，舒武什人才被迫逃离这个地区。宦官们像虫子一样在凤皇面前磕头，获得了至前的土地。\n\n我们现在只是以前的影子，只限于与游牧的鸟骑兵和其他可能窜过边境的害虫作战。我们必须向那些可悲的宦官报仇，夺回北方霸主的衣钵，以便通过我们的保护，使江阳人民获得和平与繁荣。"


R22_endless_moon:0 "无尽之月"
R22_endless_moon_desc:0 "无尽之月，这颗蕴含惊世骇俗魔力的神秘蛋白石，是第一诃利秣罗阇陨灭后伽多索「暗帝」崛起的关键。无与伦比的储存与转化灵力（烟州人称之为「气」）的能力，使他其恐怖得以统治蔓延。\n\n当宝石在缚松底罗和他的同伴们的大胆袭击中被击碎时，由受害者「气」孕育的凶恶灵体破封而出，消失于未知之地。无尽之月的碎片被凯旋的英雄们分获，其中水晶球大小的最大碎片被缚松底罗持有，并随其血脉传承至今。\n\n尽管碎片不具备完整宝石的全部威能，但它本身仍然是一件强大的奥术神器。传闻其储存与转换气的能力能改善持有者体质，造就了弃利那地曼波罗部统治者的异常长寿。"


string_start_title_gushuokguan:0 "石军之地"
string_start_gushuokguan:0 "台阶上站着一群杂乱无章的战士，他们眺望着被鲜血浸透、一片焦土的战场，而就在几小时前，这里还站满了成千上万的士兵。他们遍体鳞伤，站在雨水、鲜血和泥泞中，疲惫不堪，但最重要的是他们取得了胜利。他们在一个季节里第二次击败了至前和北渡港的入侵军队，这两支军队傲慢地看着古朔关的土地，认为很容易就能征服。他们企图瓜分这块被殴打、被流放、被压迫的土地，以谋取私利，但事实证明这是痴人说梦。\n\n「现在该是收敛死者，让他们回家的时候了。」卢也在帮忙，因为在石军中，军官的地位仅高于协调人员，在其他方面他都是平等的。他需要找到他弟弟宝的尸体。在寒冷的夜晚，卢会给他盖上母亲给他的御寒布。他曾向母亲保证，宝会尽快回来，因为收获季节需要他。\n\n卢的故事很普通。兄长失去了弟弟，父亲失去了儿子，儿子失去了父亲。所有人都并肩作战，保卫着他们称之为家的那一小块土地。因为这片土地与东洲的其他土地不同：它没有贵族领主的压迫，没有腐败宦官的阴谋，也没有城市商人的贪婪。在这片土地上，无论出身、种族或信仰如何，所有人都可以购买或借出一块土地，将其变成自己的一片乐土。在古朔关，每个人都是自由的，只要他们尊重邻居，随时准备战斗。"


Y01_infiltrate_eunuch_council_title:0 "渗透黑玉城"
Y01_infiltrate_eunuch_council_desc:0 "禁丘的「长生阁」是贪得无厌的霸占者、抢劫者和投机者。他们所统治的土地正是咒灵神宫以前的领地，一派被认为已经早已灭绝的神宫，由被放逐的赤鬼组成。其中大部分人是因为学术原因而被驱逐——就是说，他们所宣扬的学识甚至连赤鬼都无法接受。禁丘的宦官们毫无疑问地攫取了他们的研究成果，用于自身；也就是说，他们可以不依靠血脉传承永恒统治。\n\n然而，这种贪婪并非没有代价。他们贪心蔽目、反复无常、优柔寡断。派谧雾神官去抓住他们想必是易如反掌的，而更简单的方法是，破坏他们的议会，把它拖到真正需要它的地方。"


Y85_continent_wide_revolution_title:0 "大陆叛乱"
Y85_continent_wide_revolution_desc:0 "蓝巾会的目标是崇高的，他们想为整个东洲带来公平的统治。但为了实现他们的目标，他们首先需要证明自己能够击败宦官、地主和君主，从而使政权合法化。"


Y15_liberty_home_title: "自由之家"
Y15_liberty_home_desc: "自几百年前诃利秣征服该地区以来，宦官就一直统治着烟州的大部分地区。虽然初衷是为了建立一个没有私心的政府，但它实际上做了相反的事情，将烟州人民置于一个缺乏人性的统治之下。渗透到这些政府中的一个应该可以教会我们如何推翻它。"


Y15_ignite_light_title: "点燃光明"
Y15_ignite_light_desc: "我们已经消灭了宦官阶级，但我们必须走得更远。烟州人民呼唤自由，而这取决于我们是否给予他们自由。和以前一样，一次迅速的打击就能推翻整个旧秩序，我们过去的行动在人民心中仍有印象，一旦时机成熟，他们就会起来加入我们的事业。"


bianfang_storm_the_palaces_title:0 "攻破宫殿"
bianfang_storm_the_palaces_desc:0 "北方战线已经稳固，是时候将战局引向烟河下游，进入宦官之地了。当他们作为虎人光荣的税吏统治着烟州时，虎人早已无法保护这些弱小的人了。\n\n这些傲慢、投机而趋炎附势的统治者自以为在所谓的烟心联盟中就高枕无忧了，但现在是时候让他们看看什么是真正的力量，并把他们赶出宫殿了。但我们的顾问提醒我们，虽然他们的军队毫无疑问不堪一击，但宦官们在烟州仍然有着相当大的政治影响力，我们必须尽快决定他们的命运。"


Y72_end_noble_merchant_title:0 "结束阶层的纷争"
Y72_end_noble_merchant_desc:0 "教士阶层长期忠于皇室，但随着他们建立类似于烟州一样的宦官国家的企图失败后，他们的权利遭到了削弱。贵族和商人相对而言并不算忠诚，他们经常利用皇室继承时的混乱推进自己的议程，打击敌对势力并攫取权力。虽然我们的间谍已经使得我们能够将他们的权力关在牢笼之内，但或许也是时候让一切变得更符合我们的喜好了……"


R51_eunuch_ministers_title:0 "宦官与官员们"
R51_eunuch_ministers_desc:0 "当诃利秣征服东方并把许多民族纳入他的帝国时，他面临着一个新奇的问题——从零开始建设一个帝国的官僚机构。不像罗祆存在罗阇国官员，烟州不存在管理国家的上层建筑。诃利秣没有扩大种姓制度，而是创建了一个新的官僚机构，它更符合烟州人的习俗——宦官。\n\n随着时间的推移，宦官们的影响力甚至超过了罗祆的官员们，在诃利秣的国家的东部地区崩溃后，宦官们继续统治着现在的独立君主国。现在烟洲的大部分地区已经收回，问题就来了，我们该如何处理宦官大臣们，如何将他们的行政专长整合到罗阇官员中。这次合并需要时间，但获得这么多有才华的官僚肯定对国家有好处。"


gushuokguan_4_1_title:0 "卷轴共和国"
gushuokguan_4_1_desc:0 "名义上，我们国家由故狮壁统治，但实际上由宦官统治。然而，这些宦官与天楼或烟心共和国的宦官有很大不同。古朔关的宦官是群有能力但迷失方向的难民，他们在遭受迫害、战争或阴谋诡计后逃离自己原来的国家。他们缺乏政治力量，无法在社会上组成任何有力量的群体，但他们并非一无是处。我们的大部分老兵和农民不懂国事，因此，古朔关的镇议会提出一项建议，制定一部宪法，赋予宦官统治国家的强大地位，以换取他们对国家理念的忠诚和奉献。新誓言将被写入宪法，士兵、农民和宦官都将恪守誓言。"


xia_humble_ultimatum_title:0 "对卑微者的最后通牒"
xia_humble_ultimatum_desc:0 "我们的边界现在与蓝巾会擦肩而过，这是一个因反抗暴虐的统治者而诞生的新国家。他们不是以宦官的所谓共和政府和或者是裙带关系的方式统治，而是真正的自我统治。但归根结底，他们的社会环境没有自治的基础，他们的统治不会长存。并且，所有正义的人都必须在一侠的公正指导下团结起来——但也许他们应该得到更宽容的对待。"


R62_the_dragon_command_title: "龙令"
R62_the_dragon_command_desc: "流经全东洲的两条大河——佉楼若那河和烟河——两者都来自我们的土地，因而我们对它们的整个流域地区的宣称是十分正当合理的。毕竟，正是烟河的下游向东进入烟州，才给那里的整片地区带来了生命。当地土人声称，这条大河的灵魂实际上就是世上最为强大的生物：龙。因此，当我们宣称他们的河流，他们的生命线时，同时宣称为他们的伟大保护者自然也是非常合适的。我们将分割出一个新的令，特别为他们创建的——龙令。\n\n烟州的宦官们是群狡猾的家伙。他们的学校和大学已经超越了行政管理和哲学的世俗追求，进入了自然科学领域。龙令最敏锐的思想家们将汲取他们的秘密，并将其转化为工程奇迹。他们将为命令秩序大司令部的战争机器配备最先进的战争机械。"


R62_instill_fear_in_locals_title: "当地的劫掠恐慌"
R62_instill_fear_in_locals_desc: "朱红林北方的人民有着坚强的灵魂，不管是席家还是坎离二行观的宦官议会的失败都没法让他们对我们的军队彻底服从。或许一次掉几个行会头领的脑袋就可以重新认识一下他们现在的主人是谁了。"


flavour_yinquan.25.desc6: "有些人可能会认为，掌握大权的[Root.GetName]将永久关闭精英侠客们共商大事的正道枢密会。事实并非如此！虽说武侠们确实不被允许参与制定国家事务，因为这不再是他们的管辖范围，但正道枢密会也决定了许多有关运作门派的事项，比如管辖什一税、选出扬升大师，以及如何以让大多数人都满意的方式分配领土。尽管正道枢密会不允许我们派遣卫士直接参会，但我国在事后也会得到有关会议讨论内容的记录。\n\n总之，尽管落入我们的掌控可能会引起仙界独立思潮的问题，但大多数侠客都很好地接受了我国管理。我国尽量让他们保持原本的习俗，并给予他们优厚的待遇。这一举动结出了丰硕的果实，国家和侠客间建立了深厚的相互信任；考虑到我们之间的许多联系，这并不完全令人惊讶。"


flavour_yinquan.25.desc12: "雄流城素以「罗祆之心」而闻名遐迩，难以计数的文官们在此埋首处理着幅员辽阔的罗阇国内大小事务。昔日的各部官员流传出了许多罗阇国笑话——其中，「在罗祆种植小麦需要多少人？」是人们最喜欢说的。现在，当我国军队穿过街道，这些笑话中的许多都有了新的含义：雄流城是一座罪恶之都。\n\n雄流城内部的腐败格外严重，整座城市都能感受到由众多高等哲学文官组成的阶层那令人窒息的存在。宦官，我们在烟州将之悉数殄灭的团体，成群结队地居住在雄流城，忙于流氓式的诉讼以扼杀他们不喜欢的一切事物。这座城市是高等哲学的心脏地带，一次次伟大的辩论都于此发生并最终解决。这座城市是黑暗污秽的纪念殿堂；恶毒的宦官们摩拳擦掌，试图将整个东洲置于他们的邪恶秩序之下。\n\n但这永远不会发生。罗阇国的四部将被夷为平地，其中的宦官将被悉数绞死。火焰和信仰将无远弗届地将罗阇国全境从其高等哲学压迫者手中解放。[Root.GetName]的伟大治理将让雄流城成为一座前所未有的宗教和商业中心。切除肿瘤总是会伤害身体，但新的活力将使之复苏并更为强壮。"


Y25_eunuch_integration_decree_title: "融合法令"
Y25_eunuch_integration_decree_desc: "在征服烟州之后，伟大而睿智的诃利秣·神召铲除了该地区根深蒂固的王国和贵族。他设计并实行了阉宦管理与行政制度，这一制度在烟州一直沿用至今。对于他的遗产，尊重其意愿和愿景是非常重要，但我们已经碰到了一个问题，即宦官管理体系如何与拟议的烟州种姓制度协调工作。当然，着并不是一个看上去十分严重的问题。罗祆的种姓制度在几千年的传统中根深蒂固，如果没有发生重大变动，几乎不可能改变它，而我们的制度才刚刚开始，我们在世界之上有着充分的自由使它适应我们的需要和愿景。我们在此地处于一个独特的位置上，这使得我们可以无拘无束地创造出我们想要的、明确的一套体系，这样，宦官如何融入种姓制度的问题就迎刃而解。因此我们将这样设计：任何接受了这套种姓，从一个被认可的宦官学院处获得培训，并进入我们行政部门服务的人都被认为是高种姓的一部分，并享受随之而来的所有益处，那些进入特别高职务的人将得到极佳的补偿，其家族成员可以参与到他们的地位中，并接受希望的任何高种姓职业的免费培训。"


Y25_spreading_our_influence_title: "传播我们的影响力"
Y25_spreading_our_influence_desc: "在诃利秣之前的时代，烟州由许多争斗不休的相互敌对的王国统治。沿河形成了紫州王国的生命线，而紫州是为了反抗北方的戟原王国而形成的。两个国家都在全国各地建造了许多堡垒来防御对方，但他们都无法抵挡诃利秣的力量，诃利秣摧毁了两个王国并将其从地图上抹去；甚至它们的王冠和头衔也被诃利秣摧毁，再没有了宣称，并被移交给他的新一代宦官管理者。与烟州的其他地区相比，烟州北部从莲畿时期以来都是一片饱受兵马之灾的荒芜土地。但生活在烟州边疆的江阳人也因战争而变得坚强。对这些人民施加我们的影响给国家带来了巨大的利益，军火贩子和雇佣兵愿意受雇帮助我们军队。当我们开始将种姓制度应用到我们刚征服的土地上时，这些铁杆战士中的许多人开始以战士的身份争夺我们上层种姓的地位。"


Y25_brethren_in_yanzhin_title: "烟心兄弟"
Y25_brethren_in_yanzhin_desc: "烟州目前的混乱状态可归咎于许多原因——奸诈的宦官和各个城主的阴谋，恐鸟骑手们的侵扰，凤凰精灵留下的旧伤。然而，最令宗畿的庄严统治者感到烦恼的是诃利秣的孩子们之间的不团结。神召家族的巨大耻辱是，诃利秣的爪上有时甚至会沾上诃利秣的血。这个状况必须被终结，我们的长然氏和谢风氏的兄弟们必须看到：我们曾一度拒绝拥有的、能够统合全烟州的神圣意志。"


V21_merchants_of_war:0 "商戈淬刃"
V21_merchants_of_war_desc:0 "金铢虽可置万物，然非凡物必有添头——逢此玄妙之机，噬道自能赠君寸心之......「馈」。\n\n武技谋略不过争锋于尺寸之争，定鼎逐鹿终须较量府仓之盈虚，纵大败亦速复其原也。雾山矿脉千年流金，百代兵戈皆出此间，然则古往今来北岭部族无数，惟我金户氏族能运筹诸市之间，挟货殖之术广纳八荒物给。\n欲铸绝世行伍，当竭府库以奉之。吾辈此中关窍，全系赤鬼魇「气」秘法——仿昔岁路终怖畏帝朝旧制，以「气」淬炼兵刃符甲，纵是田间竖子，执之即为浴血则狂的鬼面修罗。不习弓马何妨？但教敌阵闻风丧胆，自当摧城拔寨如卷席。"










 SOUTH_HALESS_NAME:0 "东洲军阀"
 SOUTH_HALESS_DESC:0 "很多盛极一时的帝国都来到南东洲送死。诃利秣罗阇永远无法驯服这里的丛林，也无法摧毁茫檀的铸堡者，只能转而撤退并在自己的辉煌中腐朽。贾赫雄心勃勃地建造了精灵港鸦老克林，但遭到了眉洪青帝国的阻挠。现在，曾经阻挠精灵先遣队的帝国正在瓦解。眉洪青被内战弄得支离破碎，洪赛的幽灵皇帝与他在墓皇的儿子陷入生死搏斗。坚明龙的水晶女王带兵聚集在幽灵皇帝身边，而她的对手俱达盖则站在幽灵皇帝的儿子身边。闻着血腥味，薛旦的掠夺者和平海的海盗像鲨鱼一样围了过来。整个地区都屏息凝神——而在卢富兰的树下，灵魂漫步，向仍在聆听的人们低语。"

 estate_lowercastes_weapon_ban:0 "法律：严格的武器禁令"
 estate_lowercastes_weapon_ban_desc:0 "「仁慈的诃利秣深知战争的酷烈，因此选择将大众从中解放。」——安贾提《飞升录》，灰元341年"

 estate_tiger_command_desc:0 "虎令尝试完成诃利秣罗阇失败的工作。他们用无比高的热情关心行政和哲学事宜，让我们的思考方式进步诸多。在其他令笨拙地在盲目中迷惑的时候，老虎会去看，会去理解。"

 estate_raj_ministries_eunuch_integration_desc:0 "烟州宦官是由诃利秣创建的，是一个平行的官僚系统，绕过了各部的习俗和程序。现在我们重新占领了宦官统治的土地，我们把他们纳入了内阁，提高了机构的效率。"

 I89_rumble_in_the_jungle_title:0 "丛林中的喧嚣"
 I89_rumble_in_the_jungle_desc:0 "曾经，虎人从野兽变成了伟大的战士。曾经，他们在一代人的时间里征服了一个大陆。曾经，他们领导着东洲有史以来最伟大的帝国。然而，这一切都已成为过去；虎人只是他们以前的影子，他们的帝国随着岁月的流逝而瓦解。在那里的帝国曾经矗立的地方，我们将建立一个新的帝国，使诃利秣的帝国成为半人马征服东洲的历史中的一个脚注。"

 form_harimraj_title:0 "统一诃利秣罗阇"
 form_harimraj_desc:0 "自诃利秣大帝时代起，诃利秣罗阇一直由我们的人民，虎人统治。然而，这条规则一直都是脆弱的，我们的弱点在被凤凰帝国征服的过程中被严厉地展示给我们。然而现在，我们的国家终于能够真正集中统治罗阇国建立一个统一的国家，在虎人的合法统治下。罗阇国不再是一个争吵的波罗部和西那波底的混乱局面。现在，所有人都要向诃利秣罗阇的君王臣服。"

 form_rahenraj_title:0 "统一罗祆罗阇"
 form_rahenraj_desc:0 "自从诃利秣大帝时代以来，罗祆罗阇国一直由我们的征服者——暴君虎人所统治。然而，这条规则一直是脆弱的，他们的弱点在凤凰帝国的征服中被粗暴地展示给我们。不过现在，我们的人民终于有能力重建罗阇国，它最终处在罗祆人的合法统治之下，而且是唯一一个的，团结的国家。罗阇国不再处于波罗部和西那波底嘈杂纷争的混乱局面。现在，所有人都要向罗祆罗阇的帝王低头。"

 form_vanrahar_title:0 "建立繁罗曷"
 form_vanrahar_desc:0 "一千多年来，虎人一直统治着东洲地区。然而，我们的祖国，飞升半岛的丛林，也就是我们的人民最早崛起的地方，几个世纪以来一直被各个争吵不休的国家所分割。然而现在，它又重新统一了，这是自传说中的诃利秣大帝时代以来从未有过的。现在，随着我们的人民真正团结起来，我们可以建立一个现代的虎人国家——繁罗曷。"

 eunuch_republic:0 "宦官监政"
 eunuch_republic_desc:0 "这个国家由一个宦官阶层统治，他们处理各个方面的行政事务。诃利秣在征服烟州时创立了一大批这样的政府，以建立一个只效忠于他的臣民阶层，不受困扰罗祆臣民的王朝斗争。"

 golden_palace:0 "金殿"
 golden_palace_desc:0 "--------------\n雄流城的金殿是次大陆上皇权的跳动中心。诃利秣罗阇在这里坐上了莲花宝座，自从391年毗那娑二世加冕以来，罗阇就没有其他的首都了。在这里，罗阇各部都有自己的办公室，是罗祆的政治权力和农业生产力赖以运转的巨大官僚车轮的枢纽。在这里，西那波底、波罗部和沙摩朅的独立罗阇们怀着敬畏、恐惧和惶恐的心情看着从高处传来的命令。宫殿里闪亮的黄铜屋顶和金色的马赛克是莲花宝座威严的明显象征，而那些在大厅里行走的人手中掌握着无数人的命运。"

 palace_of_divine_call:0 "神召宫"
 palace_of_divine_call_desc:0 "--------------\n神召宫坐落在天楼城的中心，它的金色屋顶与赤红拱门见证了这座城市的历史。灰元102年，诃利秣之子，神召的摩那缚一世下令建造了这座宫殿，作为诃利秣帝国的皇室行政机构，在莲畿帝国时期，它曾容纳了一万名宦官和其他皇室行政人员及工作人员。在此后的几个世纪里，它经历了不同时期的衰败和修复——其中最细致的修复工作是在1096年，贾赫将天楼作为其首都时进行的。他在建筑群中建造了布勒瓦尔-精灵风格的旭日厅，标志着这座宫殿是凤凰帝国的中心，也是诃利秣征服的灵魂。"

 R77_in_the_footsteps_of_harimar:0 "跟随诃利秣的脚步"
 R77_in_the_footsteps_of_harimar_desc:0 "自从诃利秣带领虎人走出丛林（现在是繁罗曷的中心地带），征服整个罗祆和东洲以来，已经有1500年了。他的政策和其他改革有很多值得说道的，但他成功的核心在于他的军事天赋。作为回应，繁罗曷的虎人加倍了他们的军事教育，希望以此诞生一个新的诃利秣。"

 R77_a_warrior_nation:0 "《一万黑豹》"
 R77_a_warrior_nation_desc:0 "《一万黑豹》是一首史诗的名字，讲述的是一支神话中在诃利秣的指挥下久经沙场的精锐部队。他们经历了许多困难和损失，但最后总是取得了胜利。最后，这支部队在艰苦卓绝的最后一战中被消灭了，因为他们面对的是比他们多二十倍的敌军。据说他们还是击溃了敌人，尽管自己已经被彻底摧毁。诃利秣认为这是这场胜利是悲剧性的，尽管如此，这场仗还是赢了。他们英勇事迹的传说激励了许多来自繁罗曷的年轻虎人去追求军事生涯。"

 R51_centralisation_of_the_banners:0 "集中旗兵"
 R51_centralisation_of_the_banners_desc:0 "千年来，诃利秣罗阇的西那波底们在战争时期被召来保卫王上。虽然人数庞大，但这些迥异封建军队总是有些混乱，而且缺乏中央指挥结构。\n\n不过，在罗阇希门多·先的统治期间，一系列针对西那波底军队结构的改革大大提高了罗阇军队的团结度。1531年的《新娑师多婆里法典》正式确立了一项长达十年的帝国法令，并确保了罗阇国军队的庞大、灵活和现代化——这些特征在第二次度阇多战争中对抗命令秩序时取得了巨大的成功。"

 R71_reform_the_administrative_caste:0 "改革行政种姓"
 R71_reform_the_administrative_caste_desc:0 "罗祆罗阇的行政种姓在很大程度上是旧诃利秣罗阇的遗物。尽管这个体系在当时已经足够了，但自从分权统治时期开始，腐败变得更加猖獗。然而，通过改革种姓制度，引入新的、年轻的、最重要的是忠诚的官僚，罗祆罗阇能够以更有效的方式管理自己的领土。"

 yanglam_rule_of_the_rainforest_kings:0 "雨林之王的统治"
 yanglam_rule_of_the_rainforest_kings_desc:0 "从诃利秣到贾赫再到鸦老克林的商人领主，他们都不得不对付臭名昭著的卢富兰雨林之王。在卢富兰，成为国王才能获得权力，并且几乎所有人声称国王的王室头衔(或者诃利，以诃利秣命名，毫无疑问)——贵族和强大的部落在卢富兰雨林不值一提，只有国王，小国王和他们的家人和臣民。然而，尽管他们有许多不同和家族积怨，却有一种强烈的热情排斥任何可能试图把他们的皇家土地称为家的外国人。"

 kai_to_the_chagrin_of_harimar:0 "让诃利秣失望之地"
 kai_to_the_chagrin_of_harimar_desc:0 "当诃利秣和他的人民来寻找上庙时，他们准备了一支庞大的军队和远征来入侵盖邦。被称为「远地」，茫檀人和罗祆人长期以来一直认为盖邦是一个有着野蛮和侵略性的民族的无尽的土地，但诃利秣认为这是一个未开发的土地，充满了上庙，毕竟，他们如此激烈的战斗是为了保护它们。\n\n答案是什么也没有。诃利秣回家时，因为聚集了这么庞大的军队而感到很尴尬。他们击败了他们遇到的任何军队，偷走了这个国家仅有的微薄财富。但那里只有少数几座寺庙，而且没有一座具有重要意义。这进一步强化了这样一种观点，即无论好坏，盖邦都是一块最好被遗忘的土地，没有什么重要意义。"

 R08_caste_without_prejudice:0 "知罗多揭法令"
 R08_caste_without_prejudice_desc:0 "曾经，诃利秣的儿子摩那缚通过了萨持颇阵法令，重组了古老的罗祆种姓制度，虎人在上层，人类在下层。尽管这一法令在南罗祆没有受到质疑，但在知罗多揭，由于远离政治中心，就意味着改革从未站稳脚跟。\n\n纵观北方西那波底的历史，人类证明了他们的英勇、技能和智慧，多年来，知罗多揭虎人统治者的态度变得更能接受与人类合作，而不是统御人类。1601年，在提尼禅罗阇的中央权威崩溃后不久，颁布了知罗多揭法令，宣布最高种姓将不再被禁止授予人类，人类从此将成为老虎庙塔土地上的平等伙伴。"

 Y19_desire_of_conquerors:0 "征服者之渴望"
 Y19_desire_of_conquerors_desc:0 "天楼被誉为烟州之宝。诃利秣和贾赫征服烟州的部分原因是他们想要占领天楼，他们被天楼宏伟的庙宇所吸引。两人也都把首都设在那里。他们的统治也都到此为止。大老虎在进入大寺庙的内室后消失了，而精灵征服者被不满的烟州统治者暗杀了。天楼是征服者的欲望，但它也要付出中毒的代价。"

 Y23_welcome_to_the_jungle:0 "欢迎来到丛林"
 Y23_welcome_to_the_jungle_desc:0 "长期以来，朱红叶林一直是帝国的墓地。即使是伟大的征服者诃利秣和贾赫也不能完全驯服她的树冠，更不用说她的人民了。任何想要征服我们王国的人都必须首先与险恶的环境作斗争，这是一个比任何凡人都凶猛的敌人。"

 Z58_of_river_and_wood:0 "河与木"
 Z58_of_river_and_wood_desc:0 "林垣最初是在诃利秣砍伐了四分之一以上的朱红叶森林之后建立的。当时江浔难民们向南迁移，在南樾的家园废墟旁定居下来。作为如此不同民族的后裔，我们有能力与外国使节和领主打交道。"

 Y18_the_auspicious_daughter:0 "祥瑞之女"
 Y18_the_auspicious_daughter_desc:0 "祥女最初是由来自古代天楼的定居者创建的，他们顺流而上，寻找一种远离城市生活的新生活。他们不知道他们的小村庄会发展成一个强大的王国，统治烟河下游的大部分地区长达数个世纪，直到灰烬天空之日造成的饥荒迫使他们屈服。虽然我们现在可能已经堕落得很惨了，但祥女重新回到她的位置只是时间问题。"
 Y18_lizicheng:0 "李子城"
 Y18_lizicheng_desc:0 "李子城是紫州国的旧皇宫，是李子朝的所在地。自从王国被诃利秣征服后，它被改造成一个著名的学习场所，保持了它作为祥女心脏的地位。"

 U20_the_elephant_lord_of_Bulwar:0 "布勒瓦尔战象领主"
 U20_the_elephant_lord_of_Bulwar_desc:0 "波视是5世纪的罗祆王子，在与新的种姓制度斗争后，他不得不逃离诃利秣罗阇，因为新的种姓制度将统治权交给了罗祆的新征服者。他和他的追随者跟随萨拉哈德的商队向西逃进沙漠，在途中损失了很多人。但几周后，他来到了阿兹卡苏尔，带着一个虽小但仍然令人印象深刻的大象部队。\n\n他向城市国王宣誓效忠，很快就被收养并嫁入皇室，成为巴里德-塞尔-苏尔，太阳堡垒的下一任国王。在他领导的大象军队带领下，他征服了整个上苏兰和布勒瓦尔，使他的王国成为布勒瓦尔东部的主要力量长达几个世纪。\n\n如今，阿兹卡苏尔的领导人总是骑着大象进行仪式，即使他们没有足够的数量来为战争服务。"

 R58_the_temple_of_towers:0 "塔庙"
 R58_the_temple_of_towers_desc:0 "萨持颇阵的旗帜上所描绘的庙塔细节丰富，这座塔庙是一位对建筑抱有大量热情的特别富有的丝绸商人的创意。这座豪华的建筑群由无数高耸的塔尖组成，每个塔尖上都飘扬着丝带，自建成以来，它一直是这座城市独特的地标。不过，对大多数人来说，它主要与诃利秣大帝有关。\n\n在他统一了飞升半岛丛林中的虎人之后，迅速征服了该城，萨持颇阵成为第一个臣服于他统治的主要城市之一。据说，在接受萨持颇阵的投降后，诃利秣爬上了塔庙的最高点。在那里，他宣称，他所看到的一切很快就会在他面前俯首称臣——他是对的。"

 R58_the_edict_of_sardiphadin:0 "萨持颇阵法令"
 R58_the_edict_of_sardiphadin_desc:0 "诃利秣的孙子摩那缚通过的众多改革之一是萨持颇阵法令。它在罗祆建立了新的种姓制度。虽然它在更广泛的地区遭受的热情复杂而矛盾，但在南部，它很轻松地就融入了法规，而且许多当地的罗祆人把他们仁慈的虎人统治者颁布的一切法令都当作福音。"

 R42_a_feast_fit_for_a_harimari:0 "适合虎人的盛宴"
 R42_a_feast_fit_for_a_harimari_desc:0 "在诃利秣大帝征服罗祆的过程中，他用许多感官感知到了对手。他那敏锐的眼睛能数出列阵迎向他的长矛的数目，他的耳朵能听到数里格之外的号角吹响。但当他来到都地那时，他的鼻子的作用则显得特别突出。\n\n都地那人并没有反抗诃利秣，而是用盛宴来欢迎他，他们宰杀了最好的牛，并安排了盛大的宴席来欢迎这位伟大的征服者。从那时起，都地那人就延续了这一传统，每十年邀请罗阇享用一次虎人盛宴。长期以来，他们的殷勤好客为都地那在莲花宫廷赢得了巨大的声音，远远超过了他们作为一个小波罗部表面上的地位。"

 R61_vamayurs_codex_desc:0 "播斯罗迦流传着这样一句话：「斗者败；书者胜。」它源于国王缚摩瑜罗的故事：他的父亲，婆罗折，是一个虎人大军阀，在飞升后的早期与诃利秣竞争。他向即将成为皇帝的诃利秣发出了一场决斗，由此缚摩瑜罗失去了一只爪子。而且，他的伤口溃烂了，直到他于灰元21年死亡。\n\n他的儿子缚摩瑜罗在笔和羊皮纸方面相较于剑盾更有天赋。他引起诃利秣的注意时，他才刚刚开始直面管理的挑战。缚摩瑜罗在起草诃利秣罗阇的第一套法律和条例中发挥了重要作用，其中许多至今仍在生效。正是这种服务，使他的王朝赢得了播斯罗迦的土地，此外，通过错综复杂的漏洞和巧妙的设计，他确保了这套法规条例得到了超越其表面的显著地位。\n\n缚摩瑜罗将他的教训和智慧编成了一部巨著，《缚摩瑜罗法典》，它代代相传，而且到了诃利秣罗阇时代后期也在西那波底之间传阅。虽然秘密，几个世纪以来它还是被制作了几份副本——在悉罗员某一庄园的书架找到他们的踪迹，并且给了花誓家年轻的西那波底摩希波剌常年指导。当印刷机传播到罗祆，它被散布得更广了。但即便如此，也很少有人像播斯罗迦的人那样仔细研究《缚摩瑜罗法典》，或将大量内容牢记于心。"

 R61_praiseless_pasiragha_press:0 "毫无赞美的播斯罗迦印刷品"
 R61_praiseless_pasiragha_press_desc:0 "播斯罗迦一直是政治批评的源头，一些对诃利秣罗阇政策后期的和做法最深刻、最尖锐的分析都来自于永论庭。16世纪，随着西部的罗祆被蓬勃发展的贾德帝国征服，外界有很多批评之声——但考虑到光明使者在该地区的不祥存在，很少有人愿意大声说出或明确地写下他们的观点。\n\n相反，播斯罗迦的许多人利用了布勒瓦尔商人在萨拉哈德带来的最新发明：印刷机。哲学家和漫画家都把政治漫画作为一种表达他们对当代事务的想法的方式。这些很快成为罗祆政治舞台的主要内容，到18世纪早期，一本在播斯罗迦印刷的小册子在诞生后的几天内就在悉罗员或红口城找到了鼓舞人心的辩论和讨论。"

 R26_the_white_gate:0 "白门"
 R26_the_white_gate_desc:0 "在古代罗祆罗阇时期，数千年前，度阇多许多主要的堡垒都逐渐凭自身发展成了独立的城市。大约灰元前600年，特别是在罗祆罗阇和它以东的王国之间的冲突之后，弃罗习比陀的城防被加强，拥有了当时最为坚固和高大的城墙。在这里，瓷器工人安心地享受着他们的财富。但当诃利秣发动袭击后，一切都变了。\n\n虽然城墙坚不可摧、不可逾越，但城门却并非如此。虎人军队迅速攻破了这座城市的大门，并迅速攻占了它的防御工事。但诃利秣是一个仁慈的征服者，他看到了将其余的瓷城置于他的控制之时，白垒城身为一个仁慈的榜样的价值。他没有洗劫这座城市，而允许其统治者效忠他为君主。然后，在他离开之前，他保证破碎的城门将用纯瓷重建，成为一座闪耀着白色光芒的灯塔，让人们记住他是如何迅速占领这座城市——以及他之后的仁慈。\n\n古老的诃利秣罗阇早已远去，但「瓷门」依然屹立不倒，它是弃罗习比陀的象征，比任何木头或石头都坚硬。尽管北部有大地精的威胁不绝，东部「黑弓」狂热者亦步步紧逼，但弃罗习比陀的白门将坚不可摧、坚如磐石、几不可逾地抵御住这一切。"

 Y26_conqueror_spring:0 "征服者之泉"
 Y26_conqueror_spring_desc:0 "诃利秣在进入烟州之前就已经听说了隐泉的温泉，当他来到我们这里时，他参观了其中最大的一个，他玩得非常开心，以至于他留下了他的勇士来保卫它，以便随时参观。一千多年后，同样的春天，凤皇本人，贾赫也参观了此地，该地区的声望进一步提高，现如今被称为征服者之泉。"

 Y01_we_shall_not_budge:0 "我们不会让步"
 Y01_we_shall_not_budge_desc:0 "许多强大的势力试图把我们从神社，城堡修道院赶走。从远古人类的罗祆罗阇，到凶猛的军阀诃利秣，甚至是强大的贾赫，都失败了。我们从他们还是使用石器的部落时就在这里了，所以当他们所有的东西在时间的残酷统治下破碎时，我们还会留在这里。"

 Y12_founded_by_deserters:0 "逃兵建立的国家"
 Y12_founded_by_deserters_desc:0 "虽然卧虎道在这个地区已经有几千年的历史了，但它发现它最热情和有效的练习者是虎人逃兵，他们中的许多人逃避命令，在诃利秣征服后的几年里，被分配到著名的致命岗位千爪林，就成了当地人。"

 Y28_kanhebao:0 "江流堡"
 Y28_kanhebao_desc:0 "在游侠河的尽头，一座古老的堡垒寺院坐落在一个河岛之上。这个城堡被称为江流寺，是流水派的所在地，是仙界的政治和经济中心，也是侠岛的首都。据称，江流寺几乎是不可攻破的，只沦陷过两次——一次是被诃利秣攻破，另一次是被贾赫攻破。"
 Y28_land_between_lands:0 "中间之地"
 Y28_land_between_lands_desc:0 "仙界的森林位于罗祆和烟州两地之间，而江流寺则位于仙界的中心。因此，江流寺的僧侣和他们的河堡掌握了两地之间大部分交通。"
 Y28_founders_of_xia:0 "侠道的建立者"
 Y28_founders_of_xia_desc:0 "许多世纪以前，升道和化道的追随者们在东洲广袤的土地上活动，他们不向任何统治者低头，以每个人认为合适的方式练习他们的武术。3世纪初，在  诃利秣死后  的混乱中，各个门派在一个名义上的领主：江流寺的领导下联合起来。" 注：200AA前后，诃利秣罗阇分裂

 Y28_inviting_righteous_masters:0 "邀请正义大师"
 Y28_inviting_righteous_masters_desc:0 "270年，第一任武林盟主开剑邀请所有正道掌门在江流堡举行峰会。随着诃利秣帝国灰飞烟灭，内战的混乱也渐渐平息，不同的侠客门派开始蠢蠢欲动和不守规矩，因此，开剑大师试图加强侠客门派之间的联系，以保持侠道的团结。经过许多天的激烈辩论——嘴上和手上——大家一致决定，这项活动将成为一个传统。每隔十年，各位正道掌门都会在江流寺聚会，讨论践行侠道的方向。"

 Y04_wenhe_education:0 "文鹤教育"
 Y04_wenhe_education_desc:0 "安江社会的许多方面都被一个被称为文鹤的团体所控制。这个由哲学家和僧侣组成的组织成立于诃利秣占领烟州的初期。虽然他们最初在整个地区都有任务，但到了14世纪，他们只限于安江，在那里他们监督年轻人的教育。然而，如果有机会，他们会重新行动起来，继续他们最古老的工作。"

 Y06_xuezhe_of_philosophy:0 "哲学学者"
 Y06_xuezhe_of_philosophy_desc:0 "央城学院最擅长的三大领域之一是哲学。正是在那里，哲学学者们进行了多年的辩论，并确定了一些主要的哲学原则，这些原则被诃利秣采纳，形成高等哲学的基础，并将在他的帝国中传播。他们的教义和著作是许多不同学派的基础，但他们对星眼学派的影响最大。"

 Y25_trappings_of_the_divine_call:0 "神召氏族装饰"
 Y25_trappings_of_the_divine_call_desc:0 "神召氏族的庄园里到处都是神器和宝物，每一件都是一些伟大祖先的事迹，很多属于他们最伟大的祖先：诃利秣，东洲皇帝，虎人帝国的创始人，上神们的学徒。他的远房后裔对自己的血统非常重视，当然也有证据支持他们的说法。"

 Y25_submit_to_the_emperor_of_yanshen:0 "臣服于烟州皇帝"
 Y25_submit_to_the_emperor_of_yanshen_desc:0 "神召诃利秣是烟州的第一个皇帝，他的孩子们继承了皇位。但几个世纪以来，他们失去了对当地宦官的控制，而这些宦官曾由诃利秣指派来统治当地。因此，到了400年，神召氏族虽仍拥有这个头衔，但它已形同虚设。没有人听从它，它也没有获得任何尊重。\n\n现在，许多个世纪之后，这种情况再次发生了变化。宗畿的虎人再次要求宦官们向神召王朝，即烟州的皇帝低头。"

 Y31_veterans_of_harimar:0 "诃利秣的老兵"
 Y31_veterans_of_harimar_desc:0 "与许多自称自古以来就居住在这片土地上的仙界人不同，我们是在相对较晚的时候随着诃利秣的入侵来到这里的。我们最初是被一个较弱的部落联盟赶出伽缚那阇的，后来被诃利秣的军队接纳。在取得许多胜利后，我们被允许定居在仙界的一块空地上，现在被称为舞虹门。于是我们皈依升道，并融入当地文化。我们的人民仍然有理由自豪，因为我们打造了自己的家园，我们作为坚强战士的遗产继续激励着现在的士兵。"

 Z67_eunuch_administration:0 "宦官行政"
 Z67_eunuch_administration_desc:0 "在诃利秣大帝征服烟州之后，被消灭的皇族被宦官阶层所取代。从那时起，他们就成为这片土地上的主导力量，利用我们祖先赋予他们的权利。\n\n这些官僚的地位都是我们的功劳，现在是时候让他们回到忠臣的位置上了。"

 R43_adherents_of_the_old_ways:0 "遵循祖制"
 R43_adherents_of_the_old_ways_desc:0 "当我们的人民第一次被赋予更高的智力，并以爪子抓取他们的智慧时，丛林法则是我们的法律，而力量是我们宣称统治地位的权利。我们中最伟大的诃利秣以武术精神赢得了对东洲的统治权，当我们的许多表亲在整个东方的金色宫殿中陷入懒散的颓废时，我们都阇揭人并没有忘记牙和爪的统治。\n\n在这里，我们民族的尚武精神丝毫未减，凭借强大的实力，我们将再次进行统治。"

 R50_blood_of_harimar:0 "诃利秣之血"
 R50_blood_of_harimar_desc:0 "诃利秣消失后，飞升半岛的土地被交给了虎王的一个孙子，一个骄傲和傲慢的战士，名叫伏影的毗制西捺。虽然多年来祖先的许多直系血统已经消亡，不过一千多年后，伏影王朝的领主们仍然带有祖先的血统，以及随之而来的所有荣耀和尊重。"

 Y67_xan_vaung:0 "碧围"
 Y67_xan_vaung_desc:0 "当诃利秣军队横扫盖邦寻找上庙时，他们遇到的大多是令人失望的埋在沙子里的碎片和被侵蚀的瓦砾堆。直到他们在墓皇发现杂草丛生的遗迹，当地的蒲兰部落已经蹲守在那里了。诃利秣让部落的人去清除藤蔓和灌木，发现了属于一座上神之庙的精美雕塑围墙。这与诃利秣以前看到的任何寺庙建筑群都不同，这面墙壁呈现出深绿色，因此它后来被命名为碧围。诃利秣留下一支驻军来研究它，然后带领军队离开，从此再也没有回来过。不过后来驻军的后代们凭高等哲学启蒙了倥族移居者，而且他们至今仍留在那里。\n\n今天碧围的翡翠尖顶高高耸立在墓皇之上，提醒着人们上神们的一切伟大。同这所有伟大一样的权威也延伸到了作为人民监护人的我们身上。"

 Y78_remembering_the_wiro:0 "纪念维罗"
 Y78_remembering_the_wiro_desc:0 "武吉曼代的战士和武术家都梦想着能被列入《「维罗」传》（「维罗」，即武吉曼代最伟大的英雄）——这部镌刻着武吉曼代至伟英雄的典册。从只用一把简陋的弯刀抵御一千名克林人的女战士玛维尔·因图恩；到曾在一万步外用箭射中诃利秣的右爪的希约·基朱尔；再到不败的决斗者亨·华特，他的波刃短剑，班南甘·马哈拉，给了他无尽的耐力，据说直到今天他还在与一个恶灵进行生死决斗；「维罗」传说总在真实之上生长，而武吉曼代的勇士永沐其辉。"

 I18_exilarch_kingdom:0 "流放者王国"
 I18_exilarch_kingdom_desc:0 "灰元前438年，翠绿之门的国王瑟里姆五世命令他的子民放弃橄榄石领地。了解到他们与石之树的地精的长期战争最终变得无法维持，瑟里姆带领他的人民进入罗佉提湿，撤离翠绿之门并在地面定居。矮人在那里繁衍生息，分散到整个大陆，融入了罗祆社会，并基本放弃了返回山区的梦想。他们的君主自称为翠绿之门的流放之王，现在的国王不是一个地方的国王，而是一个散居地的国王，并成为一个流浪的宫廷，在他们的权力所在地——銮驾上旅行以访问他们的人民的许多口袋。\n\n几个世纪以来，橄榄石矮人一直很繁荣，甚至在罗祆罗阇陨落后的混乱中建立了自己的地表王国。诃利秣的到来使矮人融入了诃利秣罗阇，但他们保留了大部分传统的自治权。流放之王持续存在，领导着他们没有土地的王国和无家可归的人民，继续影响着罗祆权力和政治的进程，直到现代。"

 ofehibi_exodus_to_madriamilak:0 "赴往阿米拉克之地"
 ofehibi_exodus_to_madriamilak_desc:0 "在灰元35年，新上任的诃利秣在罗祆崛起。随着他的诃利秣罗阇的崛起，战争和征服也随之而来。在这股不可阻挡的浪潮中，许多罗祆人逃亡，在这片土地上漫游，寻找家园。对许多人来说，这种寻找的终点站是在阳洲东部的北部海岸地区：阿米拉克之地——其城市一直是罗祆的长期贸易伙伴，有些城市甚至在虎人里出现之前就已经由古代罗祆商人建立。在此后的几个世纪里，古老的罗祆罗祆流亡者与门吉人混杂在一起，诞生了奥费希伯人，这个民族以其哲学思想的倾向和对新思想的开放性而闻名。"

 R57_the_golden_paw:0 "「金爪」殊底里什沃"
 R57_the_golden_paw_desc:0 "达维噶的「金爪」氏族起初在诃利秣及其继承人的时代是一个不起眼的小部落，统治着内罗祆一个宜人但最终并不重要的部分。但这一切都随着「金爪」殊底里什沃的崛起而改变。\n\n「金爪」殊底里什沃是一位好战、残酷且出色的战士，他在统治的四十年里，将他的小国度转变为第二军阀时代的主要国家之一，与庵多离摩、犀都尔达哈尔及播斯罗迦王国地位相当。"

 R57_pranath_and_vanrahar:0 "波罗希，繁罗曷之思"
 R57_pranath_and_vanrahar_desc:0 "在罗阇国衰落和乌摩达阇联盟成立之后，波楼些般那窣的富饶土地成为新王国都阇揭非常重要的经济支柱，而经济力量往往伴随着文化力量。\n\n因此，金爪王朝的波罗希·炁的著作在新王国内部变得流行起来。波罗希是一位伟大的演说家，他提出了诃利秣罗阇王朝因人类的无能和不忠而衰落的理论，并在他的著作中经常以波楼些般那窣城为例，说明罗阇王朝应该如何运作。\n\n尽管即使是对历史的粗略分析也会证明他的评估是前后矛盾的，但波罗希的原始民族主义概念「繁罗曷」或丛林天堂，还是在王国内部得到了广泛的支持。创建一个统一的纯虎人国家，摆脱人类的弱点、腐败和不忠的想法，极大地影响了都阇揭后来的统治者，并为未来繁罗曷国家的哲学奠定了基础。"

 V11_watchers_wall:0 "神墙守望"
 V11_watchers_wall_desc:0 "鹰大地精本该在那时死去。当诃利秣之子从南方涌出——一股牙齿和爪子组成的潮汐，推翻了帝国——所有历史先例本该将沙摩朅的鹰大地精限制在死亡或更糟的境地。\n只有基比昂·赞古的愿景拯救了他们。\n\n无论是受到神灵、祖先、灵魂的引导，还是仅仅出于绝望本身，他找到了一条救赎之路，沿着神墙本身，通过一个以前从未见过的隐藏通道，而在那个决定命运的日子之后再也没有被看到过。鹰大地精中没有人忘记了让他们在世界之巅重获新生的奇迹，但特别是那些仍然生活在神墙旁的人始终保持警惕。因为如果墙曾被攀爬过一次，它就可以再爬一次……"

 R80_army_of_heroes:0 "英雄之军"

 R80_army_of_heroes_desc:0 "当罗摩波剌「再统一者」巩固了第二次诃利秣罗阇之治时，白纹、白爪、落爪和花誓王朝的士兵以他们新罗阇的名义领导了一系列成功的北伐战役。这场战役分裂了萨那繁王国并击败了罗阇那陀伽。上佉楼若那的大多数较小的虎人国家家都更换了他们的王朝，并由南方的王朝取代，萨那繁的莲爪王朝是一个显著的例外，出于对其表亲的尊重，罗摩波剌明确下令其保留。这个新崛起的力量促使佉楼若那以外的王国形成了一个相互防御的联盟。在娑梨罗婆汉的领导下，这个盟约被历史学家称为「英雄之国联盟」。\n\n灰元1328，英雄之国的军队在在摩度剌与「再统一者」相遇，在那里他们进行了自诃利秣时代以来沙摩朅见过的最大战役。这场战役，也被称为流场之战，是一场极其接近的战斗，最终以联盟的胜利告终。被迫退出战场的罗摩波剌发誓他会回来——但他在1331年的去世意味着摩度剌标志着第二次诃利秣罗阇北方扩张的高潮。尽管联盟很快就会解散，流场之战的遗产将在几个世纪中回响，作为一个北方团结并战胜压倒性困难的时刻，它在支持室利起义期间发挥了不小的作用。"

 R97_graceful_enlightened_fierce:0 "优雅，开明，凶悍"
 R97_graceful_enlightened_fierce_desc:0 "北部河畔因大量虎人的居住而变得丰富多彩，长期以来一直是自由和创新的摇篮。从诃利秣大帝时代到象渡城和佉萨度罗统治时期，这些土地见证了帝国的兴衰。它们曾经只是诃利秣罗阇军团的宿营地，后来发展成为充满活力的定居点。虎人帝国崩溃后，这些城市成为了抵御混乱的先锋，以帝国的荣誉捍卫着北方领土。\n\n佉萨度罗王国在寻找合法统治者的过程中，看到了虎人的持久精神。对他们来说，这片土地是神圣的，是诃利秣本人的信任，迫使他们去培育、捍卫和尊重它。将他们长达千年的遗产——先进的管理和军事智慧赋予当地民众。北方虎人的贡献——无论是行政创新还是战术教育——仍然是该地区不可或缺的财富。"

 R09_enemies_of_order:0 "秩序之敌"
 R09_enemies_of_order_desc:0 "跋罗阇对罗祆动荡不安的宗教动乱的态度是明确的。苏汉领导的「宗教改革」被认为是无政府状态和社会纷争的催化剂，破坏了诃利秣大帝曾经梦想的繁荣社会。为了维护既定的秩序，他们采取了果断的措施：禁止教育工作者认可这些激进的观点，对教育和宗教机构进行严密的监控，并任命了一位部长，其明确的目的是监督文本的创作，以重申旧神的教义，同时摒弃苏汉的学说。"

 beikling_legacy_of_great_luyixu:0 "大路终国的遗产"
 beikling_legacy_of_great_luyixu_desc:0 "在虎人尚未踏足烟洲之前，我辈诸族曾统御于大路终帝国帜下，此肆虐烟河诸域之强国，凭遍山雾炉滋养铁骑，以覆面劫掠者令四方胆寒。我们的战车碾平万千聚落，将俘民献祭于维系黑暗仪式的熔炉——这一切皆是为侍奉配戴「多面面具」的伟大统治者，此等圣物正是我族无上力量和荣耀的象征。\n然而当支离破碎、群龙无首的路终国遭遇诃利秣大军压境，这辉煌时代终告终结。 侵略者焚毁诸城、筑垒屯兵，誓要将我族永恒践踏于铁蹄之下。\n\n如今诃利秣早已化作枯骨，烟州之地支离破碎，而圣面具碎片重归我族之手——是时候让恐怖帝国再度君临天下。"

 V22_legacy_of_great_luzhong:0 "大恐怖之传承"
 V22_legacy_of_great_luzhong_desc:0 "早在虎人铁蹄踏破烟州山河之前，我等先民曾深陷路终恐怖帝国的桎梏。此肆虐烟河诸域沃野之强国，以铁链与邪火践踏八荒，掠无辜者为黑暗仪典的祭品。彼时的山河浸透血泪，被魔岭邪魔所蛊惑的战争狂人们，在权欲沟壑中豢养着仇恨的毒花。\n在这至暗岁月里，先祖以碧血丹心抗击暴政。纵使身陷囹圄，仍予那饕餮恶兽以重创，直至诃利秣执天罚之剑终结其统治。\n\n即便这段过往承载着崇高的憎恶，仍是北岭血脉中不可磨灭的印记。纵是我们这般秉持正道的修者，亦难免会被\"收复故土万民归心\"的愿景所牵动。\n然若要重聚先祖疆域，以归元升道重塑民族精魂，我等当以仁爱的解放者而非暴君的姿态临世。吾等绝不言失败，手持觉悟之剑，怀揣止戈之念，此乃光明正途——关乎族群气运的天命征途，唯有以悲悯为旗方可圆满。"

 V19_civil_servants:0 "无根之吏"
 V19_civil_servants_desc:0 "帝王崩殂则传冕，宦者留任仍司职。新君或倚父辈旧宦之忠勤，却行逆改先王政令之事。宦者一生可历侍数主，藉由宫闱间刀光剑影、鸠酒弑君之频而定。\n\n阉宦今年颁新政，明年或废之；昨日歃血宣战之国，今朝或与之盟。烟州诸王更迭如走马，然任风云变幻，宦者犹立宫墙之内——此乃永固之象征，亦为亘古长明之忠仆。\n\n自诃利秣时代以降，世人皆明：阉宦本无需信其所行之事。若其竟怀笃信，反被视为粗鄙逾矩，有悖伦常。"

 spirits.206.t:0 "流浪贤者"
 spirits.206.d:0 "一位灵体最近现身宫廷，请求成为宫廷顾问！灵魂宣称自己在千年之内都作为灵体存在，曾经是诃利秣的顾问。在我们宫廷内对此两边各执一词。反对者认为这种说法毫无依据，讨论说一个灵魂不应该具有这么高的地位。相反的想法的支持者认为这一灵体的智慧可以很好的引导我国。同时，还存在谣言说有这么一派人希望这位灵体夺取我国的统治权。这些内部斗争已经到达巅峰，必须有人做出决断。"

 string_start_title_Rahen:0 "[Root.GetName]——诃利秣罗阇的继承者"
 string_start_Rahen:0 "§O起源§!\n§Y罗祆§!是一块和西边的布勒瓦尔一样古老的土地，其人类文明可以追溯到4000多年前。几个世纪以来，人类帝国主宰着这个地区，最突出的是§Y罗祆罗阇§!，它沿着§Y佉楼若那§!河建立了坚固的边界，将罗祆与东部的王国分开。但在灰烬天空之日之后，随着老虎在罗祆南部的丛林中飞升为§Y虎人§!，现状将被颠覆。\n\n§Y诃利秣大帝§!，虎人的名字来源，联合他的种族征服了罗祆和烟州，在旧罗祆的废墟上建立了§Y诃利秣罗阇§!。在萨持颇阵法令中，他的儿子将修改和改革古老的§Y罗祆种姓制度§!，把他们的族人放在这个等级制度的顶端，而人类往往被限制在中等和低等种姓。诃利秣罗阇最终崩溃，变成了相互争斗的王国，首先被贾赫的§Y凤凰帝国§!以及后来的第二诃利秣罗阇所取代，后者从雄流城开始统治次大陆的大部分地区直到今天。\n\n§O近期历史§!\n但这个新的诃利秣罗阇并非一切顺利——在中部平原地区，§Y提尼禅罗阇§!的莲花宫一个世纪以来一直在缓慢衰落，经受着内战、领土损失、腐败的官僚机构和大规模的权力分散。随着罗阇国的瓦解，西部的§Y犍计阗§!组织起来抵御风暴，§Y伽缚那阇的战象领主§!则再次准备好他们可怕的野兽进行战争。\n\n在强大的佉楼若那河口，§Y部缚乌离奴隶共和国§!坚持其在瓷器和奴隶贸易方面的主导地位，但也受到内部分裂的威胁，沿海的其他商业城市可能会试图利用这一威胁。就在上游，曾经声名显赫、令人敬畏的§Y娑梨孙伽§!现在只让人感到怜悯和不屑，其无序的贫民窟和市场已被犯罪集团占领。\n\n同时，在遥远的北方，§Y大地精命令秩序§!已经引起了广泛的恐慌，他们征服了许多独立的§Y废墟王国§!。如果不采取任何措施，命令秩序可能很快就会征服剩下的几个顽强的王国，并向南扑去，挑战虎人和人类统治的现状。\n\n最后，有传言说西部有一个新的精灵帝国，由贾赫本人的后裔领导，具有类似的征服野心。如果不加以控制，精灵对整个东洲的新一轮入侵可能就在地平线上。\n\n在这个军阀混战的新时代，这些势力和其他势力都在争夺对罗祆的控制权。在这场诃利秣罗阇的继承人之间的斗争中，谁能取得胜利还不确定。"

 string_start_title_ghavaanaj:0 "罗祆象爵"
 string_start_ghavaanaj:0 "§O起源§!\n长期以来，摩楼他沙漠和度阇多丛林之间的这片土地一直由两种人口组成：以这里为家的伽缚那阇人，以及他们在熟练的戾师协助下照料和骑乘的庞大象群。\n\n伽缚那阇部落最初统一于§Y罗祆罗阇§!，这是罗祆（和哈兰）的最初一批帝国之一，但当这个帝国在灰元前200年灭亡时，部落之间再次陷入争斗。灰元35年，§Y诃利秣大帝§!率领虎人走出飞升半岛的丛林，大举征服了整个罗祆和东洲。大象部落在他的新诃利秣罗阇中找到了一席之地，并接受了经萨持颇阵敕令改革的§Y罗祆种姓制度§!——尽管他们仍然是罗祆中少数几个人类仍能跻身上层种姓的地方之一。\n\n在诃利秣消失后的几个世纪里，随着诃利秣罗阇逐渐崩溃，这些部落重新赢得了独立。灰元1304年，伽缚那阇被自己人统一：稽设婆伊一世，§Y度伽时罗的黑王§!。但仅仅几十年后，「再统一者」罗摩波剌就来了，他要为他重新锻造的诃利秣罗阇再添一颗宝石。虽然大象的冲锋抵挡住了罗摩波剌的第一次入侵，但部落还是屈服于他的第二次入侵，黑王在莲座前放下了他的王冠。他们的伟大城市，以举办黑王城运动会而闻名的§Y黑王城§!，被送给了虎人沙漠雷霆氏族，而现在分裂的伽缚那阇部落变成了单纯的波罗部。\n\n§O近期历史§!\n然而现在，一个变革的时代降临到了整个罗祆。§Y莲花宫廷§!的腐朽从根本上毒害了日渐衰弱的罗阇国，而在北方，废墟王国已经被一个新的威胁——§R大地精的命令秩序§!——迅速征服。随着老虎锁链的削弱，大象领主可能会再次崛起。\n\n在王室的衰败中，大象领主们会再次团结起来，加冕新的黑王，将他们的养象术推向新的高峰吗？还是分裂的部落会被另一个主人踩在脚下？"

 great_daimyo_vassal_long_desc:0 "西那波底是诃利秣罗阇的大型军事附庸国。只有有限的西那波底可以同时存在，并且只能由虎人统治。他们在罗阇国的所有军事事务中协助罗阇。"

 harimari_30_harimraj_legion:0 "诃利秣罗阇军团步兵"
 harimari_30_harimraj_legionDESCR:0 "尽管现代战场已大大削弱了虎人的物理优势，但正是他们的习俗和文化持续使他们成为凶猛的战士。对自己和对自己部队的荣耀的追求，是激发诃利秣罗阇所有士兵的强烈动力，无论他们是不是虎人。"

 azkare_naamjyut_title:0 "朱红叶林"
 azkare_naamjyut_desc:0 "充满丝绸且作为东洲最大的茶叶产出地的朱红叶林还有这里的人民，都以难以征服著称，诃利秣和贾赫都已经证明了这一点。尽管这里的丛林十分危险，在我们走向统一的路程中，这里必须被征服。"

 Y85_awaken_smouldering_clan_title:0 "煴爪部族"
 Y85_awaken_smouldering_clan_desc:0 "煴爪氏族，曾经是一个声名显赫的部族，他们以咄咄逼人的武术风格而出名，这在他们的军事决策中得到了体现。他们在诃利秣和贾赫时代单枪匹马地抵抗外敌对我们民族的征服，但在过去几个世纪的平静时期，他们逐渐淡出了人们的视线。\n\n直到最近对江都的战争，他们再次显露了力量，他们在龙道以不足敌人二分之一的人数击败了江都军团。如果我们要成功地领导我们自己的进攻行动，我们肯定会需要他们的专业知识。\n\n我们正准备出击，现在是时候再度唤醒煴爪氏族了。"

 Y15_liberty_home_title:0 "自由之家"
 Y15_liberty_home_desc:0 "自几百年前诃利秣征服该地区以来，宦官就一直统治着烟州的大部分地区。虽然初衷是为了建立一个没有私心的政府，但它实际上做了相反的事情，将烟州人民置于一个缺乏人性的统治之下。渗透到这些政府中的一个应该可以教会我们如何推翻它。"

 rahen_caste_event:0 "像布勒瓦尔和它的太阳精灵一样，罗祆地区不是由占大多数人口的人类统治，而是由一个牢牢把持政权的统治种族统治。在罗祆他们被称为虎人，一种由老虎飞升而来的种族，在所谓的飞升事件后，虎人们在诃利秣大帝的领导下征服了整个罗祆并调整了罗祆古老的种姓制度以便于自身统治。虽然大多数虎人占据高种姓，但一些地区有着自己的情况：在北方，虎人的缺乏使得人类再高种姓中处于主导地位，而在南部飞升半岛的丛林中，种姓间的交融更甚。\n\n这些种姓代表了许多不同的行业和工作。高种姓代表官员和哲学家等职位，中间种姓充满了行商坐贾，下层种姓代表着治下的农民和劳工。\n\n在不同的国家，种姓制度的流动性各不相同。流动的种姓制度意味着人们可以攀登社会阶梯，而僵化的种姓制度意味着改变你的种姓或财富几乎是不可能的。\n\n罗祆的各个种姓生活在一个受许多规则和行为准则约束的社会中。他们可能时而相互支持，时而相互反对，但最终所有种姓在社会上都有自己的意义。然而，随着诃利秣罗阇的衰落，种姓制度的稳固性已经开始减弱；人类正在缓慢但肯定地刮去种姓制度的一角，而且可能不会再支持现有的协议了……"

 R51_reign_in_vizier_title:0 "支配维齐尔权力"
 R51_reign_in_vizier_desc:0 "诃利秣罗阇的大维齐尔起源于输罗波剌一世「光耀者」的未成年时期，当时急需一只强有力的手来来领导国家，防止罗阇解体。承担这一职责的瞿沙罗·金爪作为罗阇的首席大臣领导了罗祆将近25年。\n\n虽然金爪一直致力于稳定和维护罗阇的统治，但他的继任者却越发腐败和自私自利，这个职位长期以来变成了国家安全的隐患。维齐尔的独立性和野心必须被粉碎，并提醒罗阇最重要的仆人，他们仍然只是仆人而已。" 注：1333年

 R51_harimraj_royal_army_title:0 "诃利秣罗阇皇家军队"
 R51_harimraj_royal_army_desc:0 "当虎人首次在飞升半岛的丛林里出现，并开始他们对东洲的征服时，他们席卷了从波罗频伐山多到天楼的每个小国。但这支大军，娑师多婆里，并不是只由虎人构成——它整合了诃利秣征服的每个民族，带来他们独特的技能去对抗诃利秣进军攻伐的下一个王国。犍计阗马术、伽缚那阇战象、沙摩朅重步兵——这一切以及更多的都被采取且合并成一整支比各部分之和更强的力量。\n\n这支联合的军队不是个我们已忘却的教训，但我们的军队一直只有第一诃利秣罗阇曾布置的军队数量的一小部分。是时候创建一支庞大新兴、直接忠臣于罗阇的战斗力量了。"

 R51_memories_of_yanhadesh_title:0 "衍诃提师的回忆"
 R51_memories_of_yanhadesh_desc:0 "烟河的源头在沙摩朅汇聚，河水从此一路奔流直下魔岭，进入喧嚣的烟洲河区诸国。虽然罗祆在烟河沿岸的影响早已止于广室城的大瀑布下，但这也并非总是事实。\n\n在第一诃利秣罗阇支离破碎之前，有过一个统治着烟河伟大的罗祆人国家，它的国土从边方直到翠玉矿都。衍诃提师，众所周知，曾是最伟大的北方罗祆人国家。它的统治延续直到灰元49年诃利秣无可阻挡的进军将其消灭。\n\n当诃利秣东部的继承人倒台，衍诃提师也不复存在。罗祆人对征服该地区的努力也再未能成功。我们必须终结这道军事挫折留下的痕迹，再现诃利秣的伟业。要进军直下烟河，将衍诃提师之地收入囊中，回到那个永远扩张的帝国——为了过去的荣耀，以及将来的辉煌。"

 R51_tiger_on_yanhe_title:0 "虎立烟河"
 R51_tiger_on_yanhe_desc:0 "近年来，我们对烟河中部的统治已经巩固，但我们现在面临的问题与诃利秣的娑师多婆里军征服烟州时遇到的一样。烟洲人很不团结，即使是相距甚近的城市也存在着区域性竞争。\n\n这一地区的管理也引发不少的挑战，而我们作为外国人的身份以及烟河两岸盛行的多样的宗教信仰更是加剧了这些挑战。克服这种矛盾需要共同努力来传播高等哲学和罗祆文明的光芒，但总有一天，人们会看到我们是这片土地上合法且公正的主人，就像诃利秣曾经那样。"

 R51_eunuch_ministers_title:0 "宦官与官员们"
 R51_eunuch_ministers_desc:0 "当诃利秣征服东方并把许多民族纳入他的帝国时，他面临着一个新奇的问题——从零开始建设一个帝国的官僚机构。不像罗祆存在罗阇国官员，烟州不存在管理国家的上层建筑。诃利秣没有扩大种姓制度，而是创建了一个新的官僚机构，它更符合烟州人的习俗——宦官。\n\n随着时间的推移，宦官们的影响力甚至超过了罗祆的官员们，在诃利秣的国家的东部地区崩溃后，宦官们继续统治着现在的独立君主国。现在烟洲的大部分地区已经收回，问题就来了，我们该如何处理宦官大臣们，如何将他们的行政专长整合到罗阇官员中。这次合并需要时间，但获得这么多有才华的官僚肯定对国家有好处。"

 S23_all_rahens_rot_title:0 "全罗祆的腐烂"
 S23_all_rahens_rot_desc:0 "从第一诃利秣罗阇开始，罗祆就一直在腐烂。虎人也许是令人钦佩的征服者，但他们就像老虎一样懒惰、颓废。在短短几代人的时间里，腐败就在他们的莲花宫中滋生、发酵，这种腐败从未停止过。\n\n仅靠焚烧贸易国是无法清除腐败的。不，必须从其核心——罗阇国本身——下手。雄流城是其权力的所在地，因此雄流城须属于我们。夺取它将标志着罗祆时代的终结——也是我们崛起的开始。"

 jiantsiang_loyalty_title:0 "微末忠诚"
 jiantsiang_loyalty_desc:0 "宦官，烟州的统治阶层，他们在伟大的诃利秣帝国时期掌控了权力，却就有胆认为自己是统治者，并宣称了许多许多土地的主权。从传统上将，他们在坚墙的影响时最为薄弱的，因为我们首先是一个边区。\n\n即使是现在，他们也坚持从[Root.Monarch.GetHerHis]获得权力开始，长期反对[Root.Monarch.GetTitle][Root.Monarch.GetName]，但最近他们意识到了自己的错误，并开始意识到[Root.Monarch.GetTitle]不仅富有能力，而且[Root.Monarch.GetSheHe]会常驻于此。他们中的许多人正在重新考虑他们的忠诚该指向何处。"
 jiantsiang_spears_title:0 "矛海"
 jiantsiang_spears_desc:0 "北渡港人很是奇怪，他们喜爱大海而不是陆地，他们最初是从遥远的北方神秘国度而来，珍宝舰队就来自于那里。因此，他们的政府也十分奇怪：他们的统治者不是官僚，甚至不是军官...而是商人。\n\n虽然财富与繁荣并无过错，但商人却是极其堕落与腐败的，他们追逐利润，而不是以任何一丁点的公正或是道义来治理国家，我们有责任结束这种国家层面的笑柄，用武力统治矛海。"

 jiantsiang_sons_title:0 "诃利秣之子"
 jiantsiang_sons_desc:0 "宗畿的领地由烟州征服者诃利秣大帝最后存活的一支后裔统治：神召王朝。然而，与其显耀的祖先相比，他们只是一个苍白无力的影子：他们不仅被狡诈的宦官们宠溺至无能与懒惰，而且还试图继续捣鼓那已经令人生厌的罗祆种姓制度。\n\n这种形式的统治不仅对烟州来说是外来品，而且扼杀了精英统治制度，从根本上促成了腐败，而且定死了人们从出生到死亡的位置，没有了发展社会的机会。我们必须结束这一切，以征服之名，宣告自己为诃利秣真正的继承者！"

 jiantsiang_sanctum_title:0 "进入内室"
 jiantsiang_sanctum_desc:0 "天楼上庙内室，是烟州乃至更远地区最神圣之地，亦曾是上神居住之所......更有趣的是，历史上，诃利秣在神秘消失之前，最后一次看到他的地方，就是此处，而他正冒险进入其中，意图揭开诸神的神秘面纱......\n\n我们英勇的[Root.Monarch.GetTitle]已经决定，进入圣所与上神交流，并揭开这些奥秘，也许，[Root.Monarch.GetHerHis]自己的秘密也将向「他们」显露......"

 flavor_jiantsiang.5.t:0 "征服者的血统"
 flavor_jiantsiang.5.d:0 "我们已经征服了神召氏族的领地，传奇的诃利秣的后裔，一个能够巩固我们对烟州统治的机会出现了。这一次不是通过镇压国家之敌或者树立新法。不，与此相反，我们有一个机会，通过联姻来实现我们的目标。\n\n迎娶年轻的家恰公主，诃利秣最显赫的在世后裔，将给我们的后代带来征服者之血，这无疑会让许多虎人相信我们的统治者的合法性，是曾经伟大的诃利秣帝国的延续。"
 flavor_jiantsiang.6.t:0 "预言的线索"
 flavor_jiantsiang.6.d:0 "前段时间。我们敬爱的[Root.Monarch.GetTitle]参观了位于金陵的神殿，并举行千年来的仪式以表[Root.Monarch.GetHerHis]尊重。仪式结束后，一个狗头人僧侣——一个马屁精，很明显想获得[Root.Monarch.GetHerHis]青睐——告知[Root.Monarch.GetHerHis]一个所谓的预言，其如此说道：\n\n「将有一日\n一个伟大的征服者将于东方崛起，\n作为诃利秣的重生，而在[Root.Monarch.GetHerHis]军队之下，烟州将一统。\n于最英明的皇帝麾下。」\n\n虽然宫廷里的众人都认为这是一个老僧侣的胡言乱语，但很难劝得动[Root.Monarch.GetTitle]放弃认为自己有是诃利秣转世的可能性..."

 flavor_jiantsiang.12.t:0 "内室之内"
 flavor_jiantsiang.12.d:0 "[Root.GetName]知道[Root.Monarch.GetSheHe]的人们知晓天楼上庙。正如除了最有学问的哲学家之外，其他任何人也知晓那般。[Root.Monarch.GetSheHeCap]回想起他的军队包围这座城市之前，他第一次看到远方巨大的、铁锈色的建筑之时，欣赏它于这座城市无数人类创造的建筑间或隐或现时的样子。[Root.Monarch.GetSheHeCap]花了一个小时的时间，看着这些来自另一个世界的幽光在他们的位面闪烁，照亮了天楼的地标，吸引着[Root.Monarch.GetHerHis]注意力。甚至[Root.Monarch.GetSheHe]用爪子压着无穷武器的报告，要求必须看见这座烟州最伟大城市被纳入[Root.Monarch.GetHerHis]治下。[Root.Monarch.GetSheHeCap]甚至获悉，要求把最博于哲学的僧侣和高等哲学学院带到[Root.Capital.GetName]以促进[Root.Monarch.GetHerHis]知识增长。\n\n所以，当[Root.Monarch.GetSheHe]走进其中最大一个上庙时，[Root.Monarch.GetSheHe]如一只真正老虎般冷静，等待着猛扑的到来。这已经不是第一次[Root.Monarch.GetSheHe]去涉足其他人不敢涉足之地了，[Root.Monarch.GetName]思考着，这也不会是最后一次。[Root.Monarch.GetSheHeCap]击破了几个世纪的壁垒，[Root.Monarch.GetSheHe]已经作为一名征服者在火焰中开辟出一条道路，现在[Root.Monarch.GetSheHe]进入东洲最伟大的建筑之中，成为最伟大的[Root.Monarch.GetTitle]。但是随着[Root.Monarch.GetSheHe]走下扭曲的阶梯，一只爪子扶着墙，墙壁似乎在嗡嗡作响——和低语？——一种迟钝的感觉开始出现，这不是一座堡垒，不是一座城市，它不像任何[Root.Monarch.GetSheHe]所知之物。而[Root.Monarch.GetSheHe]也从未像这样走过任何地方。\n\n但有人走过。从前，一个虎人从残酷的冲突中崛起，建立了一个王国；从前，那个伟大的征服者向着天楼进发，势不可挡。从前，他曾进入这些庙宇，深入其中。然而诃利秣大帝再也没有回来。\n\n或许是他？"
 flavor_jiantsiang.12.a:0 "诃利秣已离去，而我将继承他的智慧与力量。"
 flavor_jiantsiang.12.b:0 "我即诃利秣——或者我已接近于他。"
 flavor_jiantsiang.12.c:0 "吾即诃利秣，于烈焰中重生，整个东洲都将是我囊中之物！"
 flavor_jiantsiang.13.t:0 "焰主崛起"
 flavor_jiantsiang.13.d:0 "诃利秣不仅仅是一个征服者。他用牙与爪统治者飞升丛林，当然，罗祆和烟州也是。但之后他做了更多。\n\n老虎们不懂艺术、不懂音乐、不懂哲学。虎人也不懂。直到诃利秣把这些带给了愿意采用其名的虎人。他不仅仅是征服，而且进行统治，把学者带入他的宫廷，欣赏东洲最好的作品。他的死因也毫不奇怪：不是死于战争或背信弃义；而是死于调查和探索。\n\n但他还没有完成自己的事业。仅仅播种是不够的，你必须让它们发芽，让它们成长，并消灭任何打扰的害虫。[Root.Monarch.GetName]并非诃利秣，这很好，是时候做出伟大征服者也未曾完成过的事业了。\n\n直至现在[Root.Monarch.GetTitle]已经走上了诃利秣过去的道路，但当[Root.Monarch.GetSheHe]从天楼上庙出来之后，[Root.Monarch.GetSheHe]知道[Root.Monarch.GetSheHe]已经带领[Root.Monarch.GetHerHis]走上了超越他们的第一步。"

 flavor_jiantsiang.17.t:0 "焰主崛起"
 flavor_jiantsiang.17.d:0 "当历史学家写道诃利秣时，他们写的是他闪电般的征服罗祆，他们胜利地横渡佉楼若那河，他无情地征服烟州，但他们没有讨论在那之前发生了什么，他们只是把那场战争以残酷和激烈来描述。\n\n毕竟，诃利秣大帝并不是第一代虎人，即使是第一代，他花了几十年时间在飞升半岛的从林中与他的兄弟们展开战争，用尖齿与利爪击败他的对手，直到没人再敢挑战他的统治地位。直到他赢得了这些战争，获得了相应的伤疤，他才将目光投向外面，永远地改变东洲。\n\n当[Root.Monarch.GetName]从天楼上庙出来，[Root.Monarch.GetSheHe]想知道这是否只是[Root.Monarch.GetSheHe]人生第一章的结束，所有[Root.Monarch.GetHerHis]对手最终要么屈服，要么毁灭。所有抗拒[Root.Monarch.GetHerHis]统治者都已经化为灰烬，在[Root.Monarch.GetHerHis]爪子将代表整个东洲——甚至整个哈兰无与伦比的力量。\n\n[Root.Monarch.GetSheHeCap]眨了眨[Root.Monarch.GetHerHis]眼睛。他的眼睛对着明亮的天空，看着等待他回来的随从们跪在庙宇的院子里。\n\n[Root.Monarch.GetSheHe]作为诃利秣重生了吗？这又有什么关系？[Root.Monarch.GetHerHis]过去是诃利秣，[Root.Monarch.GetHerHis]现在是诃利秣——而[Root.Monarch.GetHerHis]未来，无可否认，也将是诃利秣的未来。"

 flavor_jiantsiang.18.t:0 "焰主崛起"
 flavor_jiantsiang.18.d:0 "老虎不懂火。虎人也不懂，直到他们冲出飞升半岛的丛林，征服所有东洲人。这是诃利秣教导其子民的其中一件事。就像他教导他们不仅要战斗，还要征服，不仅要胜利，更要「胜利」。\n\n但这并没有阻止这一元素在描述诃利秣统治时期的作用。他向篝火般燃烧，他的军队如野火般无情，他的怒火燃烧得如同最命令的火焰。\n\n当[Root.Monarch.GetName]走出天楼上庙，[Root.Monarch.GetSheHe]想，如果在[Root.Monarch.GetHerHis]进入庙宇和[Root.Monarch.GetHerHis]重新出现却并没有发生什么变化之间过去1500年，这是非常令人失望的。\n\n因为它在那里。无需更多的隐喻了。\n\n在明朗的蓝色天空下，在地狱般的火焰中燃烧的[Root.Monarch.GetTitle]的眼睛在闪烁，而它不会在那里被束缚太久。"

 flavor_nuugdan_tsarai.49.t:0 "大徐法典：种族和公民权"
 flavor_nuugdan_tsarai.49.d:0 "什么是公民？一个兽人能成为公民吗？如果可以，他应该享有与人类相同的权利和惩罚吗？这是正义还是不正义？如果兽人萨满希望他们的罪犯受到比我们更严厉的处罚怎么办？尽管寿命不同，精灵监狱的量刑是否应该与人类的一样重？虎人应该获得公民身份吗？毫无疑问，他们对政府来说是一笔财富，但有些人类仍然对诃利秣的征服颇有微词。\n\n许多来自大城市的人认为，授予所有人公民身份是一条进步的道路，建立一个由各种族代表组成的议会，以处理多种族帝国的所有细微差别，以此避免冲突。而来自传统人类社区，例如西土、舒武什和其他在非人类种族手中遭受巨大痛苦的人们认为这一想法是荒谬的，并敦促[Root.GetRulerTitleAndNameOrRegencyCap]限制非人类种族的权利。"

 blood_lotus_rebellion.6.t:0 "战士自荐"
 blood_lotus_rebellion.6.d:0 "当[Root.Monarch.GetName]与他的大臣们讨论税收问题之时，大厅的门轰然推开，一位虎人穿过了它见过的级数最多的台阶之一到来。他自我介绍，他叫娑剌·黑爪。我们之前就听过关于他的传言：他被视作来自南部丛林的伟大战士。显然，他与诃利秣大帝诞生于同一家园。虽然他武功显赫，但他对人类的蔑视也是出了名的。他似乎就是在这种背景下自荐，要去」教那些人类摆正位置」。"

 blood_lotus_rebellion:0 "血莲叛乱"
 blood_lotus_rebellion.1.t:0 "血莲叛乱"
 blood_lotus_rebellion.1.d:0 "种姓制度我们维护了千年之久！在那些年月里，虎人领着高种姓指引中低种姓的人类。这是我们的使命，由上神们其亲自指定的使命！\n\n现在，种姓制度面临着分崩离析的风险。罗祆有许多在我们的治下重新合并的人类国家，已经开始在我们[Root.GovernmentName]的中低种姓中传播危险思想。受这些邪说的刺激，我们土地上不少人类已经揭竿而起，都簇拥在古老而血红的罗祆罗阇的旗帜下。"

 blood_lotus_rebellion.300.d1:0 "「只有通过服从、协调和艰苦劳动，人类才能显示自己的价值。只有通过接受自己在社会中的地位，他们才能提升自己，最充分地发挥自己的潜力。只有通过种姓制度，在虎人的指导下，他们才能繁荣。」—诃利秣大帝\n\n第一天清早，当人类代表团到达宫殿时，空气中还弥漫着花香。代表团穿着只有简单图案的黑色长袍，因为他们被胜利者指示不要穿高于自己种姓的衣服。另一边站着这些胜利者——虎人。虎人身着能买到的最奢华的长袍，长袍上还装饰有裁缝能想到的最精美的图案。谈判将在几天内分成三轮进行。在这些谈判中虎人不把人类当作伙伴或平等的对象，而是当作一个被征服的民族，他们除了接受一切要求外别无选择……\n\n第一轮谈判的第一项议题是赔偿，一位虎人谈判代表称之为「令人沮丧的人类叛乱的麻烦」。最富有的人类农民的所有资产将直接进入那些在血莲间财富损失最多的虎人的金库，所有奢侈作物如香料或棉花的利润将直接被虎人政府拿走。第二项是申诉权，更确切地说，是废除了申诉权。农民再也不能向当地领主发表不满，也不能提出任何要求。第三项议题是兵役。从现在起，人类只会充当炮灰、步兵或卑微的工人，军官职位将成为虎人的专属。\n\n最后是谁属于低种姓的问题。虽然虎人代表团在这个问题上建立了统一战线，但实际上还是存在分歧：少数的低种姓虎人应该保留不变吗？在谈判间歇时，他们就此事进行了辩论，最后决定……"

 blood_lotus_rebellion.300.d2:0 "「一棵树不会因为自己想要改换叶子才改换它们，而是为了能在下一个季节存活下来。所以社会改变，不是因为他们想改变，而是因为他们为生存而奋斗。」—小罗陀阇瞿多\n\n代表团以有象征性的方式一起进入宫殿。他们以平等的姿态并行步入，双方都希望结束导致国家分裂的冲突。诃利秣的后代和人类坐下来讨论种姓制度的改革，以及想通过改革把整个国家凝成一个整体。气氛可以说是紧张而又安心。谈判在代表团相互玩笑和饮酒之后就开始了。整个谈判将分为三轮，包括数十个较小的议题、协定和磋商。\n\n第一个议题是取消所有债务和要求赔偿。这是一个有争议的议题，但其必要性是显而易见的。为了防止积怨，所有的债务都要一笔勾销。第二个议题是将军中平等法典化。现在，军队将以功绩而不是种姓为基础。人类和低种姓者可以晋升为将军，虎人高种姓成员的职责将不再仅限于军官团。第三个议题是农业部门的经济自由。如果他们愿意，任何虎人现在都可以成为农民，能在他们的土地上平静地度过一生。\n\n又讨论了一些议题和要点之后，他们终于敲定一切了。人类和虎人在低种姓中是平等的，他们之间再也不会有任何区别。协定的最后草案达成了，双方代表团都回到了各自的住处，休息一下，为下一轮谈判做准备……"

 blood_lotus_rebellion.300.d3:0 "「牧羊人必须要让他的羊群吃得好，受到保护。他们必须表现出有做羊的意义和安慰。否则，羊就可能不再服从牧羊人，还会抛弃他们。这不仅让牧羊人失去了生计，而且还失去了所有的意义。」——染爪的毗铎\n\n「谈判不是在皇宫、别墅或任何要人的房子里进行的。不，它们举办在一个军用帐篷里，而且还是个人类指挥部的帐篷。他们向虎人表明，老虎统治的时代已经结束，人类的时代已经来到了罗祆。这是一个阴天，虎人代表团在武装卫兵的护送下前往谈判，因为总指挥部不信任他们。虎人们被对待的方式是过去数世纪来被征服和剥削的民族的仇怨的一个标志。现在虎人应该知道人类是如何被对待的了。官方上说，这是一场谈判，但实际上，虎人既没有机会也没有权力来提出要求或建议。他们被击败了，人类将制定所有的新条款。谈判分成三轮，涉及多个议题。他们开始了……\n\n第一轮的第一个议题是财富和土地的分配。人类代表团想要复仇，因此实施了严厉的土地再分配政策。虎人将失去他们几乎所有的土地，他们的财富将作为一种补偿收入胜者囊中。第二个议题是军队的全面改革。虎人不再被允许在军队中服役，因为人类不相信他们中的任何一个会对新国家忠诚，实际上，先前的叛军就是现在国家的合法武装力量。\n\n最后一个议题是低种姓的最终构成。虎人将被迫变成了农民、工人和各种服务人员。虽然有些人类可能想保留在低种姓，但从现在起，他们将能够享受为他们辛苦工作的虎人的利得！这是虎人的黑暗之刻，这是人类的光辉之时……"

 rahen.17.t:0 "丛林天堂"
 rahen.17.d:0 "「主子，焦虑不安。奴隶，焦躁不安。诃利秣罗阇的腐败已经对罗祆人民的日常生活造成了严重影响。破败的道路、污秽和肮脏——这些装饰了曾经辉煌的阗婆娑那沿岸的城市。罗阇漠不关心，被他的朝臣们在金碧辉煌的宫殿里所说的甜言蜜语所迷惑。西那波底和波罗部，本应负责服务罗阇，却在争夺权力和影响力的过程中耗尽了自己。\n\n世界本不该是这样的。\n\n虎人，伟大者之嗣，曾经的社会领袖，曾骄傲而正直地沿着圣道前行——你们现在如何自处？被狡猾和短视的人类排挤到一边，被诱入自满和懒惰。我们的士兵，曾从阿兹卡-苏尔的沙漠进军到天楼的海岸，现在却只是卑微地跟随他们卑鄙领主的任性。我们的帝国，是诃利秣自己设想的、大地上最伟大的帝国，现在却只是稍纵即逝的幻想。曾有一个天堂般的梦想。那些要实现它的人去哪儿了？」\n\n——摘自《摩诃罗阇·繁罗曷》或《丛林天堂》"
 rahen.17.a:0 "美梦成真是我们的命运"
 rahen.17.b:0 "愿繁罗曷荣光永存"

 rajnadhaga_avenge_the_peace_title:0 "向1351年和约复仇"
 rajnadhaga_avenge_the_peace_desc:0 "大约一个世纪前，由于害怕南方霸权的复兴，北境诸王国联合了起来。重生的诃利秣罗阇在罗阇那陀伽被迫停止了步伐。我们被迫割让了揭都婆的土地，但我们没有忘记这片土地理应属于我们。现在，随着罗阇的衰弱和分裂，这是个我们夺回它们的完美机会。"

 rajnadhaga_empower_merchant_class_title:0 "授权商人阶层"
 rajnadhaga_empower_merchant_class_desc:0 "商人在由诃利秣罗阇建立的种姓制度中一直扮演着微小的角色。尽管我们比虎人更灵活变通，但对他们仍然有很多的偏见，这阻碍了王国的经济。让我们解除这些限制，这样我们才能充分享受到我们土地的利益!"

 shenral_a_major_heresy_title:0 "主要异端"
 shenral_a_major_heresy_desc:0 "高等哲学诞生于诃利秣大帝的征服和对东洲的憧憬，一千多年来一直在整个罗祆占主导地位。这种信仰并非没有缺陷，「苏汉」就是利用这些缺陷为自己的异端信仰辩护。然而，其中一些信仰是合乎逻辑的，而我们的人民却分裂了。我们必须在这场哲学大辩论中站在一边，以普尔塔纳之名，再次团结众神的追随者！"

 seghdihr_dealing_tigers_title:0 "催眠勇虎"
 seghdihr_dealing_tigers_desc:0 "罗祆是一块人类居住的土地，却是由虎人统治的，一个我们从未遇到过的民族。他们是一群能够像人类一样走路与说话的老虎，是统治着诃利秣罗阇地区各个封地和小国的哲人王。南域黄金集团已经开始请求我们准备他们前往拜访罗阇和他的大维齐尔的任务，以确保我们能更加广泛接触罗祆地区。值得庆幸的是，罗阇的统治者不过是颓废而目光短浅的，这意味着它应该相对容易地将贸易引向正确的方向——我们的方向。"

 R62_an_unusual_frontier_title:0 "一个不寻常的前沿阵地"
 R62_an_unusual_frontier_desc:0 "这片被称为诃利秣摇篮的土地对我们来说完全是陌生的。几个世纪以来，我们只知道东洲丘陵的森林腹地。然而，当我们的士兵进一步向南推进时，我们发现了一个奇异的景观：扭曲的藤蔓和高耸的树木被近乎恒定的降雨所支撑，这是一个绿色的地狱，疾病似乎像虎人的爪子一样致命。\n\n我们的一些人从里到外腐烂，他们的皮肤因我们不知道的疾病而从骨头上脱落。这并不重要。不管这块土地有多恶劣，我们都会忍受。不，我们会茁壮成长，尽管这个地方很严酷，但它将是我们的，就像全罗祆终有一天会成为我们的。藤蔓将被扯断，丛林将被驯服。这是我们的命运，我们与生俱来的权利。"

 the_command.4001.t:0 "污秽之遗"
 the_command.4001.d:0 "当诸神之弃——即其他种族所称的「灰烬天空之日」——开幕时，一个事实已昭然若揭：诸神即便存在，也不配受崇拜。然而，我们的祖先花了数百年才完全接受这一事实。最终，所有大地精都承认了这一不可否认的真相……或者说我们曾如此认为。\n\n我们刚刚得知，还有一支自称为鹰大地精的同族在大灾难中幸存下来，我们双方虽近在咫尺，却被群山与神墙所阻隔，他们如今仍被自私的萨满肆意统治。他们的现状正如我们所料：普通民众沦为奴隶，萨满则手握绝对权力，肆无忌惮地犯下种种暴行而无惧后果。我们始终警惕萨满死灰复燃，而鹰大地精这个如同我们扭曲镜像般社会的存在引发了巨大震动。他们的存在已导致大规模恐慌，大地精民众疾呼采取行动以阻止他们。\n\n我们的公民或许过于急切，但他们的诉求本质正确：鹰大地精社会的存在是对我们的赤裸裸挑战，绝不能置之不理。必须尽快将其制服，而事实上他们的家园并不遥远。探险队已被组织起来，搜索翠玉矿都中每一条可能被用于逃离的古老矮人隧道，历史学家也在梳理记录，以确定他们最可能的离开时间。他们无法，也不能逃脱正义的惩罚。"
 the_command.4001.a:0 "这笔遗产在许久之前就该被埋葬了"
 the_command.4001.b:0 "做好准备！目前，我们还没法触及他们......"
 the_command.4002.t:0 "恶魔之军"
 the_command.4002.d:0 "当诃利秣掀起的灾祸席卷先祖故土时，唯有萨满基比昂·赞古的幻术使我们免遭这些虎魔屠戮。他带领我们进入嫩许兰并封堵了来路。我们不知是否还有其他大地精从诃利秣手中幸存；但如今知晓真相后，我们宁愿他们已被杀害。\n\n这些远亲已彻底堕落为混沌的爪牙。他们摧毁一切美好与神圣，并不满足于独守其腐化之道。他们发动无休止的战争以奴役任何挡路者，并扭曲臣民的心智，使其将混沌视为秩序，秩序视为混沌。\n\n比这更可怖的是他们使用的黑暗物质——他们称之为「黑凝之晶」。它拥有吞噬魔法本身的骇人力量。而尽管远亲已然堕落，但更令我们忧心的是他们的同僚——赤鬼，神话中的食人恶魔，与我们熟知的寻魂食人魔截然不同，他们是物质背后的黑暗智囊，尽管他们向盲目的远亲隐瞒了真相，但我们能看清其真实意图——腐化并主宰灵界。\n\n「命令秩序」及其爪牙的存在是对世界本身的威胁。消灭这些混沌仆从的重任落在我们肩上，因为唯有我们明白他们带来的危险。"
 the_command.4002.a:0 "猪，狮和狼在尘地之间争吵不休，而雄鹰昂扬翱翔于天。"

 L62_cooperation_with_mengi_title:0 "门吉协作"
 L62_cooperation_with_mengi_desc:0 "从诸多方面来看，我们与门吉人的关系，就像我们的先祖诃利秣与罗祆人一般。诃利秣大帝凭借警觉的目光与指引的利爪，为罗祆照亮了通往光明未来的道路；如今对门吉人来说，我们亦同时承担起守护者与协作者的双重身份。\n\n凭借高贵的慷慨与无私的援助，我们践行着自己在凡世的使命，启迪那些需要仰赖我等智慧的族群。不过，我等的仁慈之中也蕴藏着睿智，因为他们的感恩之心终将化作帝国的福祉：门吉战士将为我们确保赐予罗祆最珍贵的礼物——源源不绝、不可或缺的劳动力。"

 Y25_order_of_the_meticulous_eye_title:0 "精目"
 Y25_order_of_the_meticulous_eye_desc:0 "上庙是所有高等哲学学习者灵感与学识的伟大源头。神庙中的学者们向我们传授了无数的智慧、指引与哲理，然而，直至今天，也无人能确切知晓哲学高耸庙宇的用途，它们的目的是什么？它们是如何运作以达成这个目的的？上神们足够聪慧，能够获得启示，所以这些建筑肯定有某种宏伟的目的，这就是我们想要发现的。为此，我们将组建庙学监，他们是烟州最聪慧的头脑，将致力于研究神庙。"

 Y25_palace_of_the_divine_call_title:0 "神召殿"
 Y25_palace_of_the_divine_call_desc:0 "无论如何，诃利秣似乎希望他的帝国（或者说至少其中一个）的中心位于天楼，因为据说他只是看了这座城市一眼，就彻底爱上了它。这座城市先前已经存在了一些基础设施，尤其是古老的神召宫。翻修它代价不菲，但它将为我们的家族提供一个居所，同时这也将是一个可以俯瞰整个烟州的最高级别政府的新中心。"

 Y25_spreading_our_influence_title:0 "传播我们的影响力"
 Y25_spreading_our_influence_desc:0 "在诃利秣之前的时代，烟州由许多争斗不休的相互敌对的王国统治。沿河形成了紫州王国的生命线，而紫州是为了反抗北方的戟原王国而形成的。两个国家都在全国各地建造了许多堡垒来防御对方，但他们都无法抵挡诃利秣的力量，诃利秣摧毁了两个王国并将其从地图上抹去；甚至它们的王冠和头衔也被诃利秣摧毁，再没有了宣称，并被移交给他的新一代宦官管理者。与烟州的其他地区相比，烟州北部从莲畿时期以来都是一片饱受兵马之灾的荒芜土地。但生活在烟州边疆的江阳人也因战争而变得坚强。对这些人民施加我们的影响给国家带来了巨大的利益，军火贩子和雇佣兵愿意受雇帮助我们军队。当我们开始将种姓制度应用到我们刚征服的土地上时，这些铁杆战士中的许多人开始以战士的身份争夺我们上层种姓的地位。"

 Y25_eunuch_integration_decree_title:0 "融合法令"
 Y25_eunuch_integration_decree_desc:0 "在征服烟州之后，伟大而睿智的诃利秣·神召铲除了该地区根深蒂固的王国和贵族。他设计并实行了阉宦管理与行政制度，这一制度在烟州一直沿用至今。对于他的遗产，尊重其意愿和愿景是非常重要，但我们已经碰到了一个问题，即宦官管理体系如何与拟议的烟州种姓制度协调工作。当然，着并不是一个看上去十分严重的问题。罗祆的种姓制度在几千年的传统中根深蒂固，如果没有发生重大变动，几乎不可能改变它，而我们的制度才刚刚开始，我们在世界之上有着充分的自由使它适应我们的需要和愿景。我们在此地处于一个独特的位置上，这使得我们可以无拘无束地创造出我们想要的、明确的一套体系，这样，宦官如何融入种姓制度的问题就迎刃而解。因此我们将这样设计：任何接受了这套种姓，从一个被认可的宦官学院处获得培训，并进入我们行政部门服务的人都被认为是高种姓的一部分，并享受随之而来的所有益处，那些进入特别高职务的人将得到极佳的补偿，其家族成员可以参与到他们的地位中，并接受希望的任何高种姓职业的免费培训。"

 Y25_laying_the_groundwork_title:0 "奠基"
 Y25_laying_the_groundwork_desc:0 "当诃利秣·神召消失后，他的帝国最终分裂。我们是他帝国在东半部烟州的后裔，我们统治了烟州几个世纪，但由于统治不善，经历了令人失望而遗憾的衰落。诃利秣帝国的另一半，诃利秣罗阇，不仅维持了它的权力，并比我们多统治了四个世纪，并且随着第二个诃利秣罗阇在1312年的建立迎来了复兴，它再次牢固地控制了罗祆，我们许多代良主都在思考为什么诃利秣罗阇会比我们更加成功，在1131年，在第二诃利秣罗阇建立的181年前，神召亚他沙去往罗祆带回了他的答案。即使在支离破碎的状态下，罗祆的军阀依旧强大，需要被尊重。被严格遵守的种姓制度让统治者对臣民有了比其他制度更强的控制，确保了王国更加稳定。因此，我们的计划正式确立，通过实行罗祆种姓制度来确保对烟州的控制，然而我们不能简单的期望在不受任何重大阻力的情况下强制推行，出于这个原因，我们需要一定的预防措施和妥协，以确保不会发生叛乱，或使其保持在一个较低水平。"

 gommo_expansion_events.27.t:0 "侏儒僧侣？"
 gommo_expansion_events.27.d:0 "[4871.GetName]高耸的寺庙一直是朝圣者、学者和法师的灯塔，远在诃利秣到来——又销声匿迹——之前就是了。在烟州，没有一个宦官未在[4871.GetName]接受训练。最近，随着全球贸易的思潮日渐深入人心，这座城市的魅力吸引了越来越多的远方来客。\n\n如今，最大最有影响力的侏儒组织戈莫的一个代表团已经抵达这座城市。这些侏儒是研究者和思想家，他们希望在我们的寺庙中学习，甚至要研究寺庙本身！虽然侏儒们的智慧闻名于世，他们也可以帮助我们加深对神学的理解，但他们脑中装的是外国知识，使用的是外国的方法。尽管这些新来者富有潜力，但许多老牌学院和有权势的宦官对他们持怀疑态度。我们应该允许他们进入寺庙吗？如果让他们进来，我们应该阻止他们扰乱寺庙的圣洁吗？"

 blood_lotus_rebellion.229.d:0 "罗祆发现自己陷入了混乱，因为一个名为「血莲」的游击队组织拿起了武器，反抗他们所称的种姓制度的不公正。他们无疑是正义的，因为人类在诃利秣罗阇遭受了几个世纪的压迫。\n\n现在机会来了，我们可以用最小的努力与这些游击队建立一条联络线，并将物资送到他们反抗[From.GetName]的斗争中。问题是：我们要做么？"

 suhans_praxis_events.4.t:0 "终典学派热情"
 suhans_praxis_events.4.d:0 "「在虎人的内心深处，有一种病态。我们是天生的竞争者，并且开始相信，没有我们的衰落，其他人就无法崛起。我常常坐在下士们的家中——通常是他们的妻子邀请我——被问到，如果没有整爪赋予的力量和勇武，我如何指望我们虎人保持权力、发动战争呢？」\n\n「对此，我要问：诃利秣的领地还剩下什么？没有虎人统治我的出生地，而这并非因为缺乏军事才能。我们虎人一直未能理解的是，信仰的力量可以击败权威，是无数个体在某一刻将他们的息汇聚到一个点上的矛盾统一。」\n\n「这是虎人必须学会的一课，否则我们必将灭亡。」"
 suhans_praxis_events.4.a:0 "第十九讲，于都阇揭"



